<!DOCTYPE html>
<html>
<head th:replace="~{fragments/page :: head(titleKey='page.blacklist.title', descriptionKey=null, titleText=null, descriptionText=null)}"></head>

<body th:dir="${currentLang.direction}">
<div th:replace="~{fragments/page :: header}"></div>

<section class="section">
	<nav aria-label="面包屑" class="breadcrumb" data-tx="t0020:50f55d23">
		<ul>
			<li><a data-tx="t0021:1798fbdb" th:href="@{/settings}">设置</a></li>
			<li class="is-active"><a aria-current="page" data-tx="t0022:71e2fcb4" href="#">黑名单</a></li>
		</ul>
	</nav>

	<div class="content">
		<h1 data-tx="t0023:9bb283fa">您的黑名单</h1>

		<p data-tx="t0005:7a770612">在本页中，您可以查看您个人已封禁的所有号码。黑名单上的号码将始终在您的设备上被拦截，即使该号码在社区数据库中的评分还不高。</p>

		<div class="notification is-success" th:if="${settingsMessage}">
			<button class="delete" onclick="this.parentElement.style.display='none';"></button>
			<span th:text="${settingsMessage}"></span>
		</div>
	</div>

	<div class="content">
		<p data-tx="t0006:4dc69521" th:if="${blacklist.empty}">您尚未明确阻止任何号码。要阻止一个号码，请使用上面的搜索栏搜索该号码并写下负面评论，或者在 FRITZ 的阻止列表中为该号码建立一个电话簿条目！</p>

		<th:block th:unless="${blacklist.empty}">
			<p data-tx="t0007:7a2801d3">您已明确阻止了这些号码。您可以在此取消意外阻止：</p>

			<form id="bulkDelete" method="post" th:action="@{/update-settings(action='lists')}">
				<input name="redirect" type="hidden" value="/blacklist"/>
			</form>

			<div class="field list-entry" th:each="entry : ${blacklist}" th:with="phoneInfo=${#converters.analyze(entry.phone)}">
				<div class="entry-view">
					<label class="checkbox">
						<input form="bulkDelete" th:name="|bl-${entry.phone}|" type="checkbox"/>
						<strong th:text="${phoneInfo.shortcut}" th:title="${phoneInfo.plus}"></strong>
						<span class="tag" th:classappend="${entry.rating.cssClass}" th:if="${entry.rating != null and entry.rating.name != 'B_MISSED' and entry.rating.name != 'A_LEGITIMATE'}" th:text="${#messages.msg(entry.rating.labelKey)}"></span>
					</label>
					<button class="button is-small is-ghost edit-toggle" data-tx="t0026:cd459696" title="编辑评论" type="button">
						<span class="icon is-small"><i class="fa-solid fa-pen-to-square"></i></span>
					</button>
					<p class="help" th:if="${entry.comment != null and !entry.comment.empty}" th:text="${entry.comment}"></p>
				</div>

				<form class="entry-edit" method="post" style="display:none;" th:action="@{/update-settings(action='lists')}">
					<input name="redirect" type="hidden" value="/blacklist"/>
					<input name="edit-comment-phone" th:value="${entry.phone}" type="hidden"/>
					<div class="field">
						<div class="control">
							<textarea class="textarea" name="edit-comment-text" rows="2" th:text="${entry.comment}"></textarea>
						</div>
					</div>
					<div class="field is-grouped">
						<p class="control">
							<button class="button is-small is-primary" type="submit">
								<span class="icon"><i class="fa-solid fa-floppy-disk"></i></span>
								<span data-tx="t0025:31aafd4a">节省</span>
							</button>
						</p>
						<p class="control">
							<button class="button is-small edit-cancel" type="button">
								<span data-tx="t0027:b551b861">取消</span>
							</button>
						</p>
					</div>
				</form>
			</div>

			<div class="field is-grouped">
				<p class="control">
					<button class="button is-danger" form="bulkDelete" type="submit">
						<span class="icon"><i class="fa-solid fa-trash"></i></span>
						<span data-tx="t0010:74d7495f">删除</span>
					</button>
				</p>
			</div>
		</th:block>
	</div>

	<div class="content">
		<form method="post" th:action="@{/update-settings(action='lists')}">
			<input name="redirect" type="hidden" value="/blacklist"/>

			<div class="field">
				<label class="label" data-tx="t0011:7309300c">区块编号</label>
				<p class="control has-icons-left">
					<input class="input" data-tx="t0012:4e762f67" name="add-bl" placeholder="新的垃圾邮件编号" type="tel"/>
					<span class="icon is-small is-left">☎</span>
				</p>
				<p class="help" data-tx="t0013:7b65bad4">您可以在此输入一个或多个垃圾邮件电话号码，中间用逗号隔开，格式不限：07041-123456789、+49171123456789、0034 123456789。 这些号码将被添加到您的个人拦截列表中。</p>
			</div>

			<div class="field">
				<label class="label" data-tx="t0019:b2ec7c34">呼叫类型</label>
				<div th:replace="~{fragments/page :: ratingButtons(name='add-bl-rating', selected='B_MISSED', excludeLegitimate=true)}"></div>
			</div>

			<div class="field">
				<label class="label" data-tx="t0015:de6dcdf4">评论（可选）</label>
				<div class="control">
					<textarea class="textarea" data-tx="t0016:f556d28e" name="add-bl-comment" placeholder="电话的内容是什么？" rows="2"></textarea>
				</div>
			</div>

			<div class="field is-grouped">
				<p class="control">
					<button class="button is-primary" type="submit">
						<span class="icon"><i class="fa-solid fa-ban"></i></span>
						<span data-tx="t0017:6464e726">加锁</span>
					</button>
				</p>
				<p class="control">
					<a class="button" th:href="@{/settings}">
						<span class="icon"><i class="fa-solid fa-arrow-left"></i></span>
						<span data-tx="t0018:aafd5700">返回设置</span>
					</a>
				</p>
			</div>
		</form>
	</div>
</section>

<div th:replace="~{fragments/page :: footer}"></div>

<script th:src="@{/assets/js/personal-list.js}" type="text/javascript"></script>
</body>
</html>
