<!DOCTYPE html>
<html>
<head th:replace="~{fragments/page :: head(titleKey='page.whitelist.title', descriptionKey=null, titleText=null, descriptionText=null)}"></head>

<body th:dir="${currentLang.direction}">
<div th:replace="~{fragments/page :: header}"></div>

<section class="section">
	<div class="content">
		<nav aria-label="面包屑" class="breadcrumb" data-tx="t0001:50f55d23">
			<ul>
				<li><a data-tx="t0002:1798fbdb" th:href="@{/settings}">设置</a></li>
				<li class="is-active"><a aria-current="page" data-tx="t0003:a61f3f91" href="#">白名单</a></li>
			</ul>
		</nav>

		<h1 data-tx="t0004:4c4f40df">您的白名单</h1>

		<p data-tx="t0005:1f03ef52">在此页面上，您可以看到所有已被排除在拦截范围之外的号码。白名单上的号码即使在社区数据库中被报告为垃圾邮件，也不会被阻止。</p>

		<div class="notification is-success" th:if="${settingsMessage}">
			<button class="delete" onclick="this.parentElement.style.display='none';"></button>
			<span th:text="${settingsMessage}"></span>
		</div>
	</div>

	<div class="content">
		<form method="post" th:action="@{/update-settings(action='lists')}">
			<input name="redirect" type="hidden" value="/whitelist"/>

			<p data-tx="t0006:624d5748" th:if="${whitelist.empty}">您没有将任何数字排除在屏蔽范围之外。</p>

			<th:block th:unless="${whitelist.empty}">
				<p data-tx="t0007:98b17ee4">您已明确将这些数字排除在拦截范围之外：</p>

				<div class="field" th:each="number : ${whitelist}">
					<label class="checkbox" th:with="phoneInfo=${#converters.analyze(number)}">
						<input th:name="|wl-${number}|" type="checkbox"/> <th:span th:text="${phoneInfo.shortcut}" th:title="${phoneInfo.plus}"></th:span>
					</label>
				</div>

				<div class="field is-grouped">
					<p class="control">
						<button class="button is-danger" type="submit">
							<span class="icon"><i class="fa-solid fa-trash"></i></span>
							<span data-tx="t0008:74d7495f">删除</span>
						</button>
					</p>
				</div>
			</th:block>
		</form>
	</div>

	<div class="content">
		<form method="post" th:action="@{/update-settings(action='lists')}">
			<input name="redirect" type="hidden" value="/whitelist"/>

			<div class="field">
				<label class="label" data-tx="t0009:ce0c23fb">添加例外情况</label>
				<p class="control has-icons-left">
					<input class="input" data-tx="t0010:45853883" name="add-wl" placeholder="新例外" type="tel"/>
					<span class="icon is-small is-left">☎</span>
				</p>
				<p class="help" data-tx="t0011:edaaa5f7">您可以输入一个或多个以逗号分隔的电话号码，格式不限：07041-123456789、+49171123456789、0034 123456789。 这些号码将不再被屏蔽。</p>
			</div>

			<div class="field is-grouped">
				<p class="control">
					<button class="button is-primary" type="submit">
						<span class="icon"><i class="fa-solid fa-check"></i></span>
						<span data-tx="t0012:d63df803">添加例外情况</span>
					</button>
				</p>
				<p class="control">
					<a class="button" th:href="@{/settings}">
						<span class="icon"><i class="fa-solid fa-arrow-left"></i></span>
						<span data-tx="t0013:aafd5700">返回设置</span>
					</a>
				</p>
			</div>
		</form>
	</div>
</section>

<div th:replace="~{fragments/page :: footer}"></div>
</body>
</html>
