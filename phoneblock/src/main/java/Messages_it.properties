page.anrufbeantworter.description = La segreteria telefonica PhoneBlock si collega al FRITZ!Box come un telefono VoIP, intercetta le chiamate pubblicitarie e infastidisce i chiamanti con dialoghi inutili.
page.anrufbeantworter.title = La segreteria telefonica PhoneBlock
page.api.description = PhoneBlock REST-API: interrogare lo stato di spam di un numero, inviare valutazioni, recuperare la blocklist â Specifiche OpenAPI e Bearer-Token-Auth.
page.api.title = L'API PhoneBlock
page.block.description = Segnalate il vostro numero di telefono come fonte di spam e contribuite al database della comunità PhoneBlock in modo anonimo e senza account.
