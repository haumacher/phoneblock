page.dongle.description = Il dongle PhoneBlock viene collegato al router e filtra le chiamate pubblicitarie a livello locale - plug &amp; play per circa 9 euro, funziona con qualsiasi combinazione di router/provider.
page.dongle.title = Dongle PhoneBlock - Filtro antispam per telefoni fissi
page.faq.description = Risposte alle domande più comuni su PhoneBlock: installazione, protezione dei dati, funzione blocklist, valutazioni, segreteria telefonica e database della comunità.
page.faq.title = Domande e risposte su PhoneBlock
page.festnetz.description = Tre modi per combattere lo spam da rete fissa: il dongle PhoneBlock, la segreteria telefonica in cloud o l'elenco telefonico a blocchi â confronto diretto basato sullo sforzo e sulla protezione dei dati.
page.festnetz.title = Bloccare lo spam nella rete fissa - PhoneBlock
