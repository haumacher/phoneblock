page.datenschutz.description = Protezione dei dati in PhoneBlock: quali dati vengono raccolti, come i numeri di telefono vengono sottoposti a hashing, nessun tracciamento, nessuna pubblicità, nessun cookie di terze parti.
page.datenschutz.title = Informativa sulla privacy di PhoneBlock
page.dongle-install.description = Passo dopo passo: ordinate il dongle PhoneBlock, inseritelo nel browser, accedete al router e in dieci minuti sarete protetti dallo spam della rete fissa.
