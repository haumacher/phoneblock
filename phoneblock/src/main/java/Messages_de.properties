page.index.description=PhoneBlock blockiert Werbeanrufe automatisch — gepflegte Sperrliste der Community für FRITZ!Box, Android und iPhone, kostenlos und Open Source.
page.festnetz.description=Drei Wege gegen Festnetz-Spam: PhoneBlock-Dongle, Cloud-Anrufbeantworter oder Blocklisten-Telefonbuch — direkter Vergleich nach Aufwand und Datenschutz.
page.dongle.description=Der PhoneBlock-Dongle steckt im Router und filtert Werbeanrufe lokal — Plug & Play für rund 10 €, in zehn Minuten eingerichtet.
page.anrufbeantworter.description=Der PhoneBlock-Anrufbeantworter meldet sich als VoIP-Telefon an der FRITZ!Box an, fängt Werbeanrufe ab und beschäftigt die Anrufer mit sinnlosen Dialogen.
page.setup.description=Blocklisten-Telefonbuch für die FRITZ!Box: PhoneBlock-Sperrliste per CardDAV einbinden — Werbeanrufer werden direkt abgewiesen, ohne Zusatz-Hardware.
page.setup-android.description=PhoneBlock für Android prüft jeden eingehenden Anruf gegen die Spam-Datenbank der Community und blockiert bekannte Werbeanrufer in Echtzeit.
page.setup-iphone.description=PhoneBlock auf dem iPhone synchronisiert die Sperrliste per CardDAV — iOS markiert Werbeanrufer aus der PhoneBlock-Datenbank automatisch beim Klingeln.
page.setup-switchboard.description=PhoneBlock-Sperrliste für Telefonanlagen und PBX: Download in mehreren Formaten oder Echtzeit-Abfrage über die REST-API — ideal für Unternehmen.
page.faq.description=Antworten zu häufigen Fragen rund um PhoneBlock: Installation, Datenschutz, Funktion der Sperrliste, Bewertungen, Anrufbeantworter und Community-Datenbank.
page.status.description=Telefonnummern aktueller Werbeanrufer in Deutschland — laufend aktualisierte Liste der von der PhoneBlock-Community gemeldeten Spam-Rufnummern.
page.stats.description=Live-Statistiken zu PhoneBlock: aktive Installationen, gemeldete Spam-Nummern, Wachstum der Community und blockierte Anrufe der letzten 30 Tage.
page.api.description=PhoneBlock REST-API: Spam-Status einer Nummer abfragen, Bewertungen einreichen, Sperrliste abrufen — OpenAPI-Spezifikation und Bearer-Token-Auth.
page.block.description=Eigene Telefonnummer als Spam-Quelle melden und damit zur PhoneBlock-Community-Datenbank beitragen — anonym und ohne Konto.
page.support.description=PhoneBlock ist Open Source und kostenlos. Spende für Hosting und Weiterentwicklung — per PayPal, SEPA-Überweisung oder QR-Code direkt in der Banking-App.
page.support-banktransfer.description=Spende an PhoneBlock per SEPA-Überweisung — alle nötigen Bankdaten und ein vorbereiteter QR-Code für deine Banking-App auf einer Seite.
page.datenschutz.description=Datenschutz bei PhoneBlock: welche Daten erfasst werden, wie Telefonnummern gehasht werden, kein Tracking, keine Werbung, keine Drittanbieter-Cookies.
page.impressum.description=Impressum für PhoneBlock — Anbieterkennzeichnung gemäß § 5 TMG, Kontaktdaten und verantwortlicher Betreiber des Dienstes.
page.usage.description=Nutzungsbedingungen für PhoneBlock — Lizenz für Sperrliste und API, Fair-Use-Regeln und Rechte der Community-Beiträge.
page.usage-search.description=Telefonnummern in der PhoneBlock-Datenbank suchen — Spam-Status, Bewertungen und Suchanfragen-Verlauf einer Rufnummer auf einen Blick.
page.usage-view-calls.description=Blockierte und verpasste Anrufe einsehen — der Anrufverlauf der PhoneBlock-App auf deinem Mobiltelefon, mit Status pro Anruf.
page.usage-report-spam.description=Telefonnummern als SPAM oder seriös melden — dein Beitrag zur PhoneBlock-Community-Datenbank, direkt aus der Mobile App.
page.usage-manage-lists.description=Persönliche Blacklist und Whitelist für PhoneBlock verwalten — eigene Sperren und Freigaben unabhängig von der Community-Datenbank pflegen.
page.phone-info.description.blocked={0} ist als Spam-Quelle gemeldet — {1} Stimmen sprechen für eine Sperrung. PhoneBlock blockiert Anrufe von dieser Nummer automatisch.
page.phone-info.description.suspicious=Zur Telefonnummer {0} liegen {1} Spam-Beschwerden vor — die Nummer wird beobachtet, aber noch nicht automatisch blockiert.
page.phone-info.description.legitimate=Zur Telefonnummer {0} liegen in der PhoneBlock-Datenbank keine Beschwerden vor — aktuell kein Spam-Verdacht für diese Rufnummer.
page.phone-info.description.wildcard=Telefonnummer {0} stammt aus einem Nummernblock mit Spam-Verdacht — {1} Stimmen für die Sperrung des Blocks, Einzelnummer noch unauffällig.
page.phone-info.description.archived=Zu {0} liegen alte Spam-Beschwerden vor — die Nummer wird nicht mehr aktiv blockiert, der Verlauf ist in der PhoneBlock-Datenbank einsehbar.
page.phone-info.description.whitelisted=Telefonnummer {0} steht auf der weißen Liste und kann von PhoneBlock nicht gesperrt werden — nur eine private Sperre ist möglich.
