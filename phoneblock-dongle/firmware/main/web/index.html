<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/ab-logo-bot.svg">
<title>PhoneBlock Dongle</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
       margin:0;background:#f5f5f7;color:#222;line-height:1.45}
  header{background:#008f7a;color:#fff;padding:.8rem 1rem;
         display:flex;align-items:center;gap:.6rem}
  header img{display:block;width:32px;height:32px}
  header h1{margin:0;font-size:1.25rem;font-weight:600;flex:1}
  header a{color:#cdeee7;text-decoration:none;font-size:.9rem}
  header a:hover{color:#fff}
  main{max-width:900px;margin:0 auto;padding:1rem}
  section{background:#fff;border-radius:8px;padding:1rem;margin-bottom:1rem;
          box-shadow:0 1px 2px rgba(0,0,0,.06)}
  h2{margin:0 0 .6rem;font-size:.85rem;color:#555;text-transform:uppercase;
     letter-spacing:.6px;font-weight:600;border-bottom:1px solid #eee;
     padding-bottom:.4rem}
  h3{margin:1rem 0 .4rem;font-size:1rem;font-weight:600;color:#222}
  .pill{display:inline-block;padding:.15rem .6rem;border-radius:999px;
        font-size:.85rem;font-weight:600}
  .ok{background:#d4edda;color:#155724}
  .bad{background:#f8d7da;color:#721c24}
  .warn{background:#fff3cd;color:#856404}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem}
  .stat{padding:.6rem;background:#fafafa;border-radius:4px;text-align:center}
  .stat-label{font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:.3px}
  .stat-value{font-size:1.6rem;font-weight:600;color:#008f7a;line-height:1.2}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  td,th{padding:.4rem .5rem;text-align:left;border-bottom:1px solid #eee}
  th{font-weight:600;color:#666;font-size:.75rem;text-transform:uppercase;letter-spacing:.3px}
  .v-SPAM{color:#d93025;font-weight:600}
  .v-LEGITIMATE{color:#188038}
  .v-ERROR{color:#e8710a}
  .muted{color:#888;font-size:.85rem}
  .error-row{border-left:3px solid #f44336;padding:.2rem .5rem;margin-bottom:.35rem;
             font-size:.9rem;background:#fffafa}
  label{display:block;margin:.6rem 0 .2rem;font-size:.8rem;color:#555}
  input, select{width:100%;padding:.4rem;border:1px solid #ccc;border-radius:4px;
        font-size:.95rem;font-family:inherit}
  input:read-only{background:#fafafa;color:#555}
  .btn-primary{background:#008f7a;color:#fff;border:0;padding:.55rem 1.2rem;
               border-radius:4px;font-size:1rem;cursor:pointer;font-family:inherit;
               text-decoration:none;display:inline-block}
  .btn-primary:disabled{background:#aaa;cursor:wait}
  .btn-ghost{background:#fff;color:#008f7a;border:1px solid #008f7a;
             padding:.55rem 1.2rem;border-radius:4px;font-size:1rem;
             cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
  .hero{background:linear-gradient(135deg,#008f7a,#00b894);color:#fff;
        border-radius:8px;padding:1.5rem;margin-bottom:1rem}
  .hero h2{color:#fff;border-bottom:1px solid rgba(255,255,255,.3)}
  .hero p{margin:.4rem 0}
  .hero .btn-primary{background:#fff;color:#008f7a;margin-top:.4rem}
  .hero-step{display:flex;align-items:center;gap:.8rem;
             padding:.8rem 1rem;margin-top:.8rem;
             background:rgba(255,255,255,.12);border-radius:6px}
  .hero-step .mark{display:flex;align-items:center;justify-content:center;
                   width:1.8rem;height:1.8rem;flex-shrink:0;
                   border-radius:50%;font-weight:700;font-size:1rem;
                   background:rgba(255,255,255,.18);color:#fff}
  .hero-step.done .mark{background:#fff;color:#008f7a}
  .hero-step .body{flex:1;min-width:0}
  .hero-step .body strong{display:block;font-size:1rem}
  .choice{display:block;padding:1rem;background:#fafafa;border:1px solid #e0e0e0;
          border-radius:6px;margin-bottom:.6rem;text-decoration:none;color:inherit}
  .choice:hover{border-color:#008f7a;background:#f0f9f6}
  .choice strong{color:#008f7a;display:block;margin-bottom:.2rem}
  .cta-row{margin:.4rem 0 .2rem}
  .status-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
              margin:.4rem 0}
  .status-row .pill{min-width:10rem;text-align:center}
  footer{text-align:center;color:#888;font-size:.8rem;padding:1rem}
  footer a{color:#888}
  .crumb{font-size:.85rem;color:#888;margin-bottom:.4rem}
  .crumb a{color:#008f7a;text-decoration:none}
  .crumb a:hover{text-decoration:underline}
</style>
</head>

// Language resolution: explicit user choice via localStorage, else
// navigator.language ("en-GB" → "en"), else German. If we have no
// strings for the requested language we fall back to the German
// master block, so any key added to only `de` still renders.
function pickLang(){
  const saved = (typeof localStorage !== 'undefined')
    ? localStorage.getItem('phoneblock_lang') : null;
  if (saved && I18N[saved]) return saved;
  const nav = (typeof navigator !== 'undefined' && navigator.language)
    ? navigator.language.split('-')[0] : 'de';
  return I18N[nav] ? nav : 'de';
}
let LANG = pickLang();
const t = (k, p) => {
  let s = I18N[LANG][k];
  if (s === undefined) s = I18N.de[k];
  if (s === undefined) return k;
  if (p) for (const [name, val] of Object.entries(p))
    s = s.replaceAll('{' + name + '}', val);
  return s;
};

// --- helpers --------------------------------------------------------

const $ = id => document.getElementById(id);

function esc(s){
  if (s === null || s === undefined || s === '') return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;');
}

function fmtSec(s){
  s = Math.max(0, Math.round(s));
  if (s < 60) return s + ' s';
  if (s < 3600) return Math.round(s/60) + ' min';
  if (s < 86400) return Math.round(s/3600) + ' h';
  return Math.round(s/86400) + ' T';
}

async function fetchJson(url){
  try { const r = await fetch(url); return r.ok ? r.json() : null; }
  catch(e){ return null; }
}

async function postForm(url, form){
  const body = new URLSearchParams();
  for (const [k, v] of new FormData(form).entries()) body.append(k, v);
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString(),
    });
    const d = await r.json().catch(() => ({}));
    return { ok: r.ok && d.ok, data: d, statusText: r.statusText };
  } catch (err) {
    return { ok: false, data: {}, statusText: 'Netzwerkfehler' };
  }
}

async function refreshAll(){
  const [s, calls, errs] = await Promise.all([
    fetchJson('/api/status'), fetchJson('/api/calls'), fetchJson('/api/errors'),
  ]);
  if (!s) return;
  const sipConfigured = !!(s.sip.host && s.sip.user);
  const tokenSet      = !!s.phoneblock.token_set;
  const heroSlot      = $('heroSlot');
  const statusSec     = $('statusSection');
  const callsSec      = $('callsSection');
  const errorsSec     = $('errorsSection');
  if (!sipConfigured || !tokenSet){
    // Setup incomplete — show the hero with per-step progress until
    // both SIP and the PhoneBlock token are configured. The status
    // dashboard below would otherwise advertise a "ready" state that
    // the device cannot actually deliver.
    renderHero(sipConfigured, tokenSet);
    statusSec.style.display = 'none';
    callsSec.style.display = 'none';
    errorsSec.style.display = 'none';
    return;
  }
  heroSlot.innerHTML = '';
  statusSec.style.display = '';
  callsSec.style.display = '';
  errorsSec.style.display = '';

  // SIP pill + detail
  const sipPill = $('sipPill');
  const sipCta  = $('sipCta');
  if (!sipConfigured){
    sipPill.textContent = t('status.sip.not_configured');
    sipPill.className = 'pill bad';
    $('sipDetail').textContent = '';
    sipCta.textContent = t('status.sip.setup_cta');
  } else if (s.sip.registered){
    sipPill.textContent = t('status.sip.connected');
    sipPill.className = 'pill ok';
    const parts = [
      t('status.sip.since', {duration: fmtSec(s.sip.registered_for_s)}),
      t('status.sip.at', {host: s.sip.host, user: s.sip.user}),
    ];
    if (s.sip.internal_number){
      parts.push(t('status.sip.ext', {n: s.sip.internal_number}));
    }
    $('sipDetail').textContent = parts.join(' · ');
    sipCta.textContent = t('status.sip.redo_cta');
  } else {
    // Configured but not yet registered — treat as "connecting" while
    // the task retries in the background, rather than as a hard error.
    sipPill.textContent = t('status.sip.connecting');
    sipPill.className = 'pill warn';
    const parts = [ t('status.sip.at', {host: s.sip.host, user: s.sip.user}) ];
    if (s.sip.internal_number){
      parts.push(t('status.sip.ext', {n: s.sip.internal_number}));
    }
    $('sipDetail').textContent = parts.join(' · ');
    sipCta.textContent = t('status.sip.redo_cta');
  }
  // Always offer a way into the wizard — hiding the button on the
  // "happy path" leaves the user stranded when they need to change
  // the registrar or the admin password later.
  sipCta.style.display = '';

  // Token pill + actions
  const tokenPill  = $('tokenPill');
  const tokenCta   = $('tokenCta');
  const tokenTest  = $('tokenTest');
  const tokenRenew = $('tokenRenew');
  if (tokenSet){
    tokenPill.textContent = t('status.token.set');
    tokenPill.className = 'pill ok';
    tokenCta.style.display   = 'none';
    tokenTest.style.display  = '';
    tokenRenew.style.display = '';
  } else {
    tokenPill.textContent = t('status.token.missing');
    tokenPill.className = 'pill bad';
    tokenCta.style.display   = '';
    tokenTest.style.display  = 'none';
    tokenRenew.style.display = 'none';
    $('tokenMsg').textContent = '';
  }
  if (!tokenTest.onclick){
    tokenTest.onclick = async () => {
      const m = $('tokenMsg');
      tokenTest.disabled = true;
      m.textContent = t('status.token.testing');
      m.style.color = '#888';
      try {
        const r = await fetch('/api/token-test', { method: 'POST' });
        const d = await r.json().catch(() => ({}));
        m.textContent = d.message || (d.ok ? '✓' : '✗');
        m.style.color = d.ok ? '#188038' : '#d93025';
      } catch (_){
        m.textContent = 'Netzwerkfehler';
        m.style.color = '#d93025';
      }
      tokenTest.disabled = false;
    };
  }

  $('cTotal').textContent = s.counters.total;
  $('cSpam').textContent  = s.counters.spam_blocked;
  $('cLegit').textContent = s.counters.legitimate;
  $('cErr').textContent   = s.counters.errors;
  $('statusInfo').textContent = t('status.info', {
    fw: s.firmware_version || '–',
    ip: s.ip_address || '–',
    uptime: fmtSec(s.uptime_s),
    api: s.phoneblock.last_api_ms > 0 ? s.phoneblock.last_api_ms + ' ms' : '–',
  });

  // Calls
  const tbody = $('callsBody');
  if (calls && calls.calls.length){
    tbody.innerHTML = calls.calls.map(c =>
      '<tr><td>' + esc(fmtSec(c.age_s)) + '</td>'
      + '<td>' + esc(c.number) + '</td>'
      + '<td>' + esc(c.display) + '</td>'
      + '<td class="v-' + esc(c.verdict) + '">' + esc(c.verdict) + '</td></tr>'
    ).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="4" class="muted">' + esc(t('status.calls.empty')) + '</td></tr>';
  }

  // Errors
  const list = $('errorsList');
  const clearBtn = $('errorsClear');
  const hasErrs = errs && errs.errors.length;
  if (hasErrs){
    list.innerHTML = errs.errors.map(e =>
      '<div class="error-row"><strong>[' + esc(e.tag) + ']</strong> '
      + esc(e.message) + ' <span class="muted">'
      + esc(t('status.errors.ago', {age: fmtSec(e.age_s)})) + '</span></div>'
    ).join('');
  } else {
    list.innerHTML = '<p class="muted">' + esc(t('status.errors.empty')) + '</p>';
  }
  clearBtn.style.display = hasErrs ? '' : 'none';
  if (!clearBtn.onclick){
    clearBtn.onclick = async () => {
      clearBtn.disabled = true;
      try { await fetch('/api/errors/clear', { method: 'POST' }); }
      catch (_){ /* next poll will reflect whatever state we end up in */ }
      await refreshAll();
      clearBtn.disabled = false;
    };
  }
}

async function onFritzboxSubmit(e){
  e.preventDefault();
  const msg = $('fbMsg');
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  msg.textContent = t('sip.fb.working');
  msg.style.color = '#888';
  const r = await postForm('/api/fritzbox-setup', e.target);
  if (r.ok){
    const n = r.data.internal_number;
    msg.textContent = n ? t('sip.fb.done.withnum', {n}) : t('sip.fb.done');
    msg.style.color = '#188038';
    setTimeout(() => location.hash = '#/', 800);
    return;
  }
  if (r.data && r.data.two_factor){
    e.target.querySelector('input[name=fritz_pass]').value = '';
    msg.innerHTML = esc(t('sip.fb.2fa.instructions', {hints: ''}))
                  + render2FAInstructions(r.data.methods || '');
    msg.style.color = '#e8710a';
    await poll2FA(msg, btn);
    return;
  }
  msg.textContent = t('sip.fb.error', {msg: r.data.message || r.statusText});
  msg.style.color = '#d93025';
  btn.disabled = false;
}

function render2FAInstructions(methods){
  const hints = [];
  if (/\bbutton\b/.test(methods)) hints.push(esc(t('sip.fb.2fa.button')));
  const dtmf = methods.match(/dtmf;(\S+)/);
  if (dtmf) hints.push(t('sip.fb.2fa.dtmf', {seq: '<code>' + esc(dtmf[1]) + '</code>'}));
  return hints.length ? hints.join(' ' + esc('oder') + ' ') : '';
}

async function poll2FA(msgEl, btn){
  const deadline = Date.now() + 130 * 1000;
  while (Date.now() < deadline){
    await new Promise(r => setTimeout(r, 2000));
    const r = await fetchJson('/api/fritzbox-2fa-status');
    if (!r) continue;
    if (r.ok){
      const n = r.internal_number;
      msgEl.textContent = n ? t('sip.fb.done.withnum', {n}) : t('sip.fb.done');
      msgEl.style.color = '#188038';
      setTimeout(() => location.hash = '#/', 800);
      return;
    }
    if (r.terminal){
      msgEl.textContent = t('sip.fb.error', {msg: r.message || t('sip.fb.2fa.cancelled')});
      msgEl.style.color = '#d93025';
      btn.disabled = false;
      return;
    }
  }
  msgEl.textContent = t('sip.fb.2fa.timeout');
  msgEl.style.color = '#d93025';
  btn.disabled = false;
}

// --- views: provider preset ----------------------------------------

function renderSipProvider(){
  let opts = '<option value="">—</option>';
  for (const [k, p] of Object.entries(PROVIDERS)){
    opts += '<option value="' + esc(k) + '">' + esc(p.name) + '</option>';
  }
  app.innerHTML = ''
    + '<section>'
    + '<div class="crumb"><a href="#/setup/sip">' + esc(t('back.sip')) + '</a></div>'
    + '<h2>' + esc(t('sip.prov.title')) + '</h2>'
    + '<p class="muted">' + esc(t('sip.prov.intro')) + '</p>'
    + '<form id="provForm">'
    + '<label>' + esc(t('sip.prov.provider'))
    + '<select name="provider" id="provSelect" required>' + opts + '</select></label>'
    + '<div id="provHint" class="muted" style="margin:.5rem 0"></div>'
    + '<div id="provVorwahlBlock" style="display:none">'
    + '<label>' + esc(t('sip.prov.vorwahl'))
    + '<input type="text" id="provVorwahl" pattern="[0-9]{2,5}" placeholder="211"></label>'
    + '</div>'
    + '<label>' + esc(t('sip.prov.user'))
    + '<input type="text" name="sip_user" required></label>'
    + '<label>' + esc(t('sip.prov.pass'))
    + '<input type="password" name="sip_pass" required autocomplete="off"></label>'
    + '<p style="margin-top:.8rem">'
    + '<button type="submit" class="btn-primary">' + esc(t('sip.prov.submit')) + '</button>'
    + '<span id="provMsg" class="muted" style="margin-left:.6rem"></span>'
    + '</p></form></section>';
  $('provSelect').addEventListener('change', onProviderChange);
  $('provForm').addEventListener('submit', onProviderSubmit);
}

function onProviderChange(e){
  const key = e.target.value;
  const p = PROVIDERS[key];
  $('provHint').textContent = p ? p.userHint : '';
  $('provVorwahlBlock').style.display = p && p.needsVorwahl ? '' : 'none';
}

async function onProviderSubmit(e){
  e.preventDefault();
  const msg = $('provMsg');
  const btn = e.target.querySelector('button');
  const key = $('provSelect').value;
  const p = PROVIDERS[key];
  if (!p){
    msg.textContent = t('sip.prov.error', {msg: '—'});
    msg.style.color = '#d93025';
    return;
  }
  let host = p.host;
  if (p.needsVorwahl){
    const v = ($('provVorwahl').value || '').replace(/^0+/, '');
    if (!v){ msg.textContent = t('sip.prov.error', {msg: 'Vorwahl fehlt'}); msg.style.color = '#d93025'; return; }
    host = p.hostTemplate.replaceAll('{vorwahl}', v);
  }
  // Build the POST body ourselves since the preset supplies host/port.
  btn.disabled = true;
  msg.textContent = t('sip.fb.working');
  msg.style.color = '#888';
  const body = new URLSearchParams();
  body.append('sip_host', host);
  body.append('sip_port', String(p.port));
  body.append('sip_user', e.target.sip_user.value);
  body.append('sip_pass', e.target.sip_pass.value);
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString(),
    });
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.ok){
      msg.textContent = t('sip.prov.done');
      msg.style.color = '#188038';
      setTimeout(() => location.hash = '#/', 800);
      return;
    }
    msg.textContent = t('sip.prov.error', {msg: d.message || r.statusText});
    msg.style.color = '#d93025';
    btn.disabled = false;
  } catch (_){
    msg.textContent = t('sip.prov.error', {msg: 'Netzwerkfehler'});
    msg.style.color = '#d93025';
    btn.disabled = false;
  }
}

// --- views: manual (expert) ----------------------------------------

async function renderSipManual(){
  const s = await fetchJson('/api/status');
  const host = (s && s.sip.host) || '';
  const port = (s && s.sip.port) || 5060;
  const user = (s && s.sip.user) || '';
  app.innerHTML = ''
    + '<section>'
    + '<div class="crumb"><a href="#/setup/sip">' + esc(t('back.sip')) + '</a></div>'
    + '<h2>' + esc(t('sip.manual.title')) + '</h2>'
    + '<p class="muted">' + esc(t('sip.manual.intro')) + '</p>'
    + '<form id="manForm">'
    + '<label>' + esc(t('sip.manual.host'))
    + '<input type="text"   name="sip_host" value="' + esc(host) + '"></label>'
    + '<label>' + esc(t('sip.manual.port'))
    + '<input type="number" name="sip_port" min="1" max="65535" value="' + esc(port) + '"></label>'
    + '<label>' + esc(t('sip.manual.user'))
    + '<input type="text"   name="sip_user" value="' + esc(user) + '"></label>'
    + '<label>' + esc(t('sip.manual.pass'))
    + '<input type="password" name="sip_pass" autocomplete="off"></label>'
    + '<p style="margin-top:.8rem">'
    + '<button type="submit" class="btn-primary">' + esc(t('sip.manual.submit')) + '</button>'
    + '<span id="manMsg" class="muted" style="margin-left:.6rem"></span>'
    + '</p></form></section>';
  $('manForm').addEventListener('submit', onManualSubmit);
}

async function onManualSubmit(e){
  e.preventDefault();
  const msg = $('manMsg');
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  msg.textContent = t('sip.fb.working');
  msg.style.color = '#888';
  const r = await postForm('/api/config', e.target);
  if (r.ok){
    msg.textContent = t('sip.manual.done');
    msg.style.color = '#188038';
    setTimeout(() => location.hash = '#/', 800);
    return;
  }
  msg.textContent = t('sip.manual.error', {msg: r.data.message || r.statusText});
  msg.style.color = '#d93025';
  btn.disabled = false;
}
