<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/ab-logo-bot.svg">
<title>PhoneBlock Dongle</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
       margin:0;background:#f5f5f7;color:#222;line-height:1.45}
  header{background:#008f7a;color:#fff;padding:.8rem 1rem;
         display:flex;align-items:center;gap:.6rem}
  header img{display:block;width:32px;height:32px}
  header h1{margin:0;font-size:1.25rem;font-weight:600;flex:1}
  header a{color:#cdeee7;text-decoration:none;font-size:.9rem}
  header a:hover{color:#fff}
  main{max-width:900px;margin:0 auto;padding:1rem}
  section{background:#fff;border-radius:8px;padding:1rem;margin-bottom:1rem;
          box-shadow:0 1px 2px rgba(0,0,0,.06)}
  h2{margin:0 0 .6rem;font-size:.85rem;color:#555;text-transform:uppercase;
     letter-spacing:.6px;font-weight:600;border-bottom:1px solid #eee;
     padding-bottom:.4rem}
  h3{margin:1rem 0 .4rem;font-size:1rem;font-weight:600;color:#222}
  .pill{display:inline-block;padding:.15rem .6rem;border-radius:999px;
        font-size:.85rem;font-weight:600}
  .ok{background:#d4edda;color:#155724}
  .bad{background:#f8d7da;color:#721c24}
  .warn{background:#fff3cd;color:#856404}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem}
  .stat{padding:.6rem;background:#fafafa;border-radius:4px;text-align:center}
  .stat-label{font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:.3px}
  .stat-value{font-size:1.6rem;font-weight:600;color:#008f7a;line-height:1.2}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  td,th{padding:.4rem .5rem;text-align:left;border-bottom:1px solid #eee}
  th{font-weight:600;color:#666;font-size:.75rem;text-transform:uppercase;letter-spacing:.3px}
  .v-SPAM{color:#d93025;font-weight:600}
  .v-LEGITIMATE{color:#188038}
  .v-ERROR{color:#e8710a}
  .muted{color:#888;font-size:.85rem}
  .error-row{border-left:3px solid #f44336;padding:.2rem .5rem;margin-bottom:.35rem;
             font-size:.9rem;background:#fffafa}
  label{display:block;margin:.6rem 0 .2rem;font-size:.8rem;color:#555}
  input, select{width:100%;padding:.4rem;border:1px solid #ccc;border-radius:4px;
        font-size:.95rem;font-family:inherit}
  input:read-only{background:#fafafa;color:#555}
  .btn-primary{background:#008f7a;color:#fff;border:0;padding:.55rem 1.2rem;
               border-radius:4px;font-size:1rem;cursor:pointer;font-family:inherit;
               text-decoration:none;display:inline-block}
  .btn-primary:disabled{background:#aaa;cursor:wait}
  .btn-ghost{background:#fff;color:#008f7a;border:1px solid #008f7a;
             padding:.55rem 1.2rem;border-radius:4px;font-size:1rem;
             cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
  .hero{background:linear-gradient(135deg,#008f7a,#00b894);color:#fff;
        border-radius:8px;padding:1.5rem;margin-bottom:1rem}
  .hero h2{color:#fff;border-bottom:1px solid rgba(255,255,255,.3)}
  .hero p{margin:.4rem 0}
  .hero .btn-primary{background:#fff;color:#008f7a;margin-top:.4rem}
  .hero-step{display:flex;align-items:center;gap:.8rem;
             padding:.8rem 1rem;margin-top:.8rem;
             background:rgba(255,255,255,.12);border-radius:6px}
  .hero-step .mark{display:flex;align-items:center;justify-content:center;
                   width:1.8rem;height:1.8rem;flex-shrink:0;
                   border-radius:50%;font-weight:700;font-size:1rem;
                   background:rgba(255,255,255,.18);color:#fff}
  .hero-step.done .mark{background:#fff;color:#008f7a}
  .hero-step .body{flex:1;min-width:0}
  .hero-step .body strong{display:block;font-size:1rem}
  .choice{display:block;padding:1rem;background:#fafafa;border:1px solid #e0e0e0;
          border-radius:6px;margin-bottom:.6rem;text-decoration:none;color:inherit}
  .choice:hover{border-color:#008f7a;background:#f0f9f6}
  .choice strong{color:#008f7a;display:block;margin-bottom:.2rem}
  .cta-row{margin:.4rem 0 .2rem}
  .status-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
              margin:.4rem 0}
  .status-row .pill{min-width:10rem;text-align:center}
  footer{text-align:center;color:#888;font-size:.8rem;padding:1rem}
  footer a{color:#888}
  .crumb{font-size:.85rem;color:#888;margin-bottom:.4rem}
  .crumb a{color:#008f7a;text-decoration:none}
  .crumb a:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
  <img src="/ab-logo-bot.svg" alt="" width="32" height="32">
  <h1>PhoneBlock Dongle</h1>

</header>
<main id="app"></main>
<footer>

</footer>

// Language resolution: explicit user choice via localStorage, else
// navigator.language ("en-GB" → "en"), else German. If we have no
// strings for the requested language we fall back to the German
// master block, so any key added to only `de` still renders.
function pickLang(){
  const saved = (typeof localStorage !== 'undefined')
    ? localStorage.getItem('phoneblock_lang') : null;
  if (saved && I18N[saved]) return saved;
  const nav = (typeof navigator !== 'undefined' && navigator.language)
    ? navigator.language.split('-')[0] : 'de';
  return I18N[nav] ? nav : 'de';
}
let LANG = pickLang();
const t = (k, p) => {
  let s = I18N[LANG][k];
  if (s === undefined) s = I18N.de[k];
  if (s === undefined) return k;
  if (p) for (const [name, val] of Object.entries(p))
    s = s.replaceAll('{' + name + '}', val);
  return s;
};

// --- helpers --------------------------------------------------------

const $ = id => document.getElementById(id);

function esc(s){
  if (s === null || s === undefined || s === '') return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;');
}

function fmtSec(s){
  s = Math.max(0, Math.round(s));
  if (s < 60) return s + ' s';
  if (s < 3600) return Math.round(s/60) + ' min';
  if (s < 86400) return Math.round(s/3600) + ' h';
  return Math.round(s/86400) + ' T';
}

async function fetchJson(url){
  try { const r = await fetch(url); return r.ok ? r.json() : null; }
  catch(e){ return null; }
}

async function postForm(url, form){
  const body = new URLSearchParams();
  for (const [k, v] of new FormData(form).entries()) body.append(k, v);
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString(),
    });
    const d = await r.json().catch(() => ({}));
    return { ok: r.ok && d.ok, data: d, statusText: r.statusText };
  } catch (err) {
    return { ok: false, data: {}, statusText: 'Network error' };
  }
}

// Latest per-boot factory-reset nonce, updated every status poll.
// Used in the /api/factory-reset POST body so that a POST replayed
// by the browser across a reboot carries a now-stale value.
let resetNonce = '';

async function refreshAll(){
  const [s, calls, errs] = await Promise.all([
    fetchJson('/api/status'), fetchJson('/api/calls'), fetchJson('/api/errors'),
  ]);
  if (!s) return;
  resetNonce = s.reset_nonce || '';
  const sipConfigured = !!(s.sip.host && s.sip.user);
  const tokenSet      = !!s.phoneblock.token_set;
  const heroSlot      = $('heroSlot');
  const statusSec     = $('statusSection');
  const callsSec      = $('callsSection');
  const errorsSec     = $('errorsSection');
  const resetSec      = $('resetSection');
  const annSec        = $('annSection');
  const syncSec       = $('syncSection');
  const fwSec         = $('fwSection');
  if (!sipConfigured || !tokenSet){
    // Setup incomplete — show the hero with per-step progress until
    // both SIP and the PhoneBlock token are configured. The status
    // dashboard below would otherwise advertise a "ready" state that
    // the device cannot actually deliver.
    renderHero(sipConfigured, tokenSet);
    statusSec.style.display = 'none';
    callsSec.style.display = 'none';
    errorsSec.style.display = 'none';
    annSec.style.display = 'none';
    syncSec.style.display = 'none';
    resetSec.style.display = 'none';
    fwSec.style.display = 'none';
    return;
  }
  heroSlot.innerHTML = '';
  statusSec.style.display = '';
  callsSec.style.display = '';
  errorsSec.style.display = '';
  annSec.style.display = '';
  syncSec.style.display = '';
  resetSec.style.display = '';
  fwSec.style.display = '';

  // Blocklist sync section: show either "unavailable" (no FB app
  // creds in NVS), "never run", "running", "last ok", "last partial"
  // or "last failed". Status line is colour-coded; the manual
  // trigger button is always visible so the user can test.
  const sync = s.sync || {};
  const syncStatus = $('syncStatus');
  const syncRun    = $('syncRun');
  const syncEnable = $('syncEnable');
  const ago        = sync.last_ago_s >= 0 ? fmtSec(sync.last_ago_s) : '–';
  syncEnable.checked = !!sync.enabled;
  syncEnable.disabled = !sync.available;
  if (!sync.available){
    syncStatus.textContent = t('status.sync.unavailable');
    syncStatus.style.color = '#888';
    syncRun.disabled = true;
  } else if (!sync.enabled){
    // Auto sync off but the manual button stays available so the
    // user can still test or do one-off submissions.
    syncStatus.textContent = t('status.sync.disabled');
    syncStatus.style.color = '#888';
    syncRun.disabled = false;
  } else if (sync.running){
    syncStatus.textContent = t('status.sync.running');
    syncStatus.style.color = '#e8710a';
    syncRun.disabled = true;
  } else if (!sync.ever_ran){
    syncStatus.textContent = t('status.sync.never');
    syncStatus.style.color = '#888';
    syncRun.disabled = false;
  } else if (!sync.last_ok){
    syncStatus.textContent = t('status.sync.last_fail',
      {ago, err: sync.last_error || '–'});
    syncStatus.style.color = '#d93025';
    syncRun.disabled = false;
  } else if (sync.last_failed > 0){
    syncStatus.textContent = t('status.sync.last_partial',
      {ago, n: sync.last_pushed, f: sync.last_failed});
    syncStatus.style.color = '#e8710a';
    syncRun.disabled = false;
  } else {
    syncStatus.textContent = t('status.sync.last_ok',
      {ago, n: sync.last_pushed});
    syncStatus.style.color = '#188038';
    syncRun.disabled = false;
  }
  if (!syncEnable.onchange){
    syncEnable.onchange = async () => {
      const want = syncEnable.checked;
      syncEnable.disabled = true;
      const body = new URLSearchParams();
      body.append('sync_enabled', want ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll will reconcile */ }
      refreshAll();
    };
  }
  if (!syncRun.onclick){
    syncRun.onclick = async () => {
      const m = $('syncMsg');
      syncRun.disabled = true;
      m.textContent = '';
      try {
        const r = await fetch('/api/sync/run', {method: 'POST'});
        const d = await r.json().catch(() => ({}));
        m.textContent = d.ok ? t('status.sync.triggered') : t('status.sync.busy');
        m.style.color = d.ok ? '#188038' : '#e8710a';
      } catch (_){
        m.textContent = 'Network error';
        m.style.color = '#d93025';
      }
      // Next poll will reflect the "running" state and re-enable
      // the button when done.
    };
  }

  // Announcement subsection: show what's currently active + whether
  // the reset-to-default shortcut is meaningful.
  const ann = s.announcement || {custom: false, bytes: 0};
  const kb = Math.round(ann.bytes / 1024);
  $('annCurrent').textContent = ann.custom
    ? t('status.ann.custom',  {kb})
    : t('status.ann.default', {kb});
  $('annReset').style.display = ann.custom ? '' : 'none';
  if (!$('annPlay').onclick)  wireAnnouncement();

  // SIP pill + detail
  const sipPill = $('sipPill');
  const sipCta  = $('sipCta');
  if (!sipConfigured){
    sipPill.textContent = t('status.sip.not_configured');
    sipPill.className = 'pill bad';
    $('sipDetail').textContent = '';
    sipCta.textContent = t('status.sip.setup_cta');
  } else if (s.sip.registered){
    sipPill.textContent = t('status.sip.connected');
    sipPill.className = 'pill ok';
    const parts = [
      t('status.sip.since', {duration: fmtSec(s.sip.registered_for_s)}),
      t('status.sip.at', {host: s.sip.host, user: s.sip.user}),
    ];
    if (s.sip.internal_number){
      parts.push(t('status.sip.ext', {n: s.sip.internal_number}));
    }
    $('sipDetail').textContent = parts.join(' · ');
    sipCta.textContent = t('status.sip.redo_cta');
  } else {
    // Configured but not yet registered — treat as "connecting" while
    // the task retries in the background, rather than as a hard error.
    sipPill.textContent = t('status.sip.connecting');
    sipPill.className = 'pill warn';
    const parts = [ t('status.sip.at', {host: s.sip.host, user: s.sip.user}) ];
    if (s.sip.internal_number){
      parts.push(t('status.sip.ext', {n: s.sip.internal_number}));
    }
    $('sipDetail').textContent = parts.join(' · ');
    sipCta.textContent = t('status.sip.redo_cta');
  }
  // Always offer a way into the wizard — hiding the button on the
  // "happy path" leaves the user stranded when they need to change
  // the registrar or the admin password later.
  sipCta.style.display = '';

  // Token pill + actions
  const tokenPill  = $('tokenPill');
  const tokenCta   = $('tokenCta');
  const tokenTest  = $('tokenTest');
  const tokenRenew = $('tokenRenew');
  if (tokenSet){
    tokenPill.textContent = t('status.token.set');
    tokenPill.className = 'pill ok';
    tokenCta.style.display   = 'none';
    tokenTest.style.display  = '';
    tokenRenew.style.display = '';
  } else {
    tokenPill.textContent = t('status.token.missing');
    tokenPill.className = 'pill bad';
    tokenCta.style.display   = '';
    tokenTest.style.display  = 'none';
    tokenRenew.style.display = 'none';
    $('tokenMsg').textContent = '';
  }
  if (!tokenTest.onclick){
    tokenTest.onclick = async () => {
      const m = $('tokenMsg');
      tokenTest.disabled = true;
      m.textContent = t('status.token.testing');
      m.style.color = '#888';
      try {
        const r = await fetch('/api/token-test', { method: 'POST' });
        const d = await r.json().catch(() => ({}));
        // Render the outcome from i18n instead of echoing the
        // server's English message — the server ships ok + a
        // stable result code so the UI stays localised.
        let key;
        if (d.ok)                   key = 'status.token.test.ok';
        else if (d.code === 'none') key = 'status.token.test.none';
        else                        key = 'status.token.test.fail';
        m.textContent = t(key);
        m.style.color = d.ok ? '#188038' : '#d93025';
      } catch (_){
        m.textContent = 'Network error';
        m.style.color = '#d93025';
      }
      tokenTest.disabled = false;
    };
  }

  $('cTotal').textContent = s.counters.total;
  $('cSpam').textContent  = s.counters.spam_blocked;
  $('cLegit').textContent = s.counters.legitimate;
  $('cErr').textContent   = s.counters.errors;
  $('statusInfo').textContent = t('status.info', {
    fw: s.firmware_version || '–',
    ip: s.ip_address || '–',
    uptime: fmtSec(s.uptime_s),
    api: s.phoneblock.last_api_ms > 0 ? s.phoneblock.last_api_ms + ' ms' : '–',
  });

  // Calls
  const tbody = $('callsBody');
  // PhoneBlock's web UI serves per-number detail pages at
  // <site>/nums/<zeroZero>. Internal Fritz!Box codes (starting with
  // "*" or "**") have no public page, so we leave them as plain text.
  const siteBase = s.phoneblock && s.phoneblock.base_url || '';
  const numCell = (num) => {
    if (!num)             return '';
    if (num.startsWith('*')) return esc(num);
    if (!siteBase)        return esc(num);
    return '<a href="' + esc(siteBase) + '/nums/' + encodeURIComponent(num)
         + '" target="_blank" rel="noopener">' + esc(num) + '</a>';
  };
  if (calls && calls.calls.length){
    tbody.innerHTML = calls.calls.map(c =>
      '<tr><td>' + esc(fmtSec(c.age_s)) + '</td>'
      + '<td>' + numCell(c.number) + '</td>'
      + '<td>' + esc(c.display) + '</td>'
      + '<td class="v-' + esc(c.verdict) + '">' + esc(c.verdict) + '</td></tr>'
    ).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="4" class="muted">' + esc(t('status.calls.empty')) + '</td></tr>';
  }

  // Errors
  const list = $('errorsList');
  const clearBtn = $('errorsClear');
  const hasErrs = errs && errs.errors.length;
  if (hasErrs){
    list.innerHTML = errs.errors.map(e =>
      '<div class="error-row"><strong>[' + esc(e.tag) + ']</strong> '
      + esc(e.message) + ' <span class="muted">'
      + esc(t('status.errors.ago', {age: fmtSec(e.age_s)})) + '</span></div>'
    ).join('');
  } else {
    list.innerHTML = '<p class="muted">' + esc(t('status.errors.empty')) + '</p>';
  }
  clearBtn.style.display = hasErrs ? '' : 'none';
  if (!clearBtn.onclick){
    clearBtn.onclick = async () => {
      clearBtn.disabled = true;
      try { await fetch('/api/errors/clear', { method: 'POST' }); }
      catch (_){ /* next poll will reflect whatever state we end up in */ }
      await refreshAll();
      clearBtn.disabled = false;
    };
  }

  const resetBtn = $('resetBtn');
  const resetMsg = $('resetMsg');
  if (resetBtn && !resetBtn.onclick){
    resetBtn.onclick = async () => {
      if (!confirm(t('status.reset.confirm'))) return;
      resetBtn.disabled = true;
      resetMsg.textContent = '';
      try {
        if (!resetNonce){
          resetMsg.textContent = t('status.reset.error',
            {msg: 'No nonce'});
          resetMsg.style.color = '#d93025';
          resetBtn.disabled = false;
          return;
        }
        const r = await fetch('/api/factory-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'confirm=' + encodeURIComponent(resetNonce),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.ok){
          resetMsg.textContent = t('status.reset.running');
          resetMsg.style.color = '#e8710a';
          // Device is about to reboot; stop the poll loop so we do
          // not flood the log with error noise during the outage.
          stopPolling();
        } else {
          resetMsg.textContent = t('status.reset.error',
            {msg: d.message || r.statusText});
          resetMsg.style.color = '#d93025';
          resetBtn.disabled = false;
        }
      } catch (_){
        resetMsg.textContent = t('status.reset.error', {msg: 'Network error'});
        resetMsg.style.color = '#d93025';
        resetBtn.disabled = false;
      }
    };
  }

  // Firmware update: file picker + upload, or check PhoneBlock CDN
  // for a newer version.
  const fwCurrent  = $('fwCurrent');
  if (fwCurrent){
    fwCurrent.textContent = t('status.fw.current', {
      partition: s.firmware_partition || '–',
      version:   s.firmware_version   || '–',
    });
  }
  const fwPick     = $('fwPick');
  const fwFile     = $('fwFile');
  const fwFileName = $('fwFileName');
  const fwUpload   = $('fwUpload');
  const fwCheck    = $('fwCheck');
  const fwMsg      = $('fwMsg');
  if (fwPick && !fwPick.onclick){
    fwPick.onclick = () => fwFile.click();
    fwFile.onchange = () => {
      const f = fwFile.files[0];
      fwFileName.textContent = f ? f.name + ' (' + Math.round(f.size/1024) + ' KB)' : '';
      fwUpload.disabled = !f;
      fwMsg.textContent = '';
    };
    fwUpload.onclick = () => {
      const f = fwFile.files[0];
      if (!f) return;
      if (!confirm(t('status.fw.confirm'))) return;
      fwUpload.disabled = true;
      fwPick.disabled   = true;
      fwCheck.disabled  = true;
      // XHR over fetch(): we want upload-progress events, which
      // the fetch API does not expose.
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/firmware', true);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');
      xhr.upload.onprogress = (e) => {
        if (!e.lengthComputable) return;
        const pct = Math.round(e.loaded * 100 / e.total);
        fwMsg.textContent = t('status.fw.uploading', {pct: pct});
        fwMsg.style.color = '#1a73e8';
      };
      xhr.onload = () => {
        let d = {}; try { d = JSON.parse(xhr.responseText); } catch (_){}
        if (xhr.status >= 200 && xhr.status < 300 && d.ok){
          fwMsg.textContent = t('status.fw.done');
          fwMsg.style.color = '#e8710a';
          stopPolling();
        } else {
          fwMsg.textContent = t('status.fw.error',
            {msg: d.message || xhr.statusText || 'HTTP ' + xhr.status});
          fwMsg.style.color = '#d93025';
          fwUpload.disabled = false;
          fwPick.disabled   = false;
          fwCheck.disabled  = false;
        }
      };
      xhr.onerror = () => {
        fwMsg.textContent = t('status.fw.error', {msg: 'Network error'});
        fwMsg.style.color = '#d93025';
        fwUpload.disabled = false;
        fwPick.disabled   = false;
        fwCheck.disabled  = false;
      };
      xhr.send(f);
    };
    fwCheck.onclick = async () => {
      fwCheck.disabled  = true;
      fwUpload.disabled = true;
      fwPick.disabled   = true;
      fwMsg.textContent = t('status.fw.checking');
      fwMsg.style.color = '#1a73e8';
      try {
        const r = await fetch('/api/firmware/check', {method: 'POST'});
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.ok){
          if (d.installed){
            fwMsg.textContent = t('status.fw.check.installed',
              {version: d.new_version});
            fwMsg.style.color = '#e8710a';
            stopPolling();
            return;
          }
          if (d.available){
            fwMsg.textContent = t('status.fw.check.found',
              {version: d.new_version});
            fwMsg.style.color = '#1a73e8';
          } else {
            fwMsg.textContent = t('status.fw.check.none',
              {version: d.current_version || s.firmware_version});
            fwMsg.style.color = '#666';
          }
        } else {
          fwMsg.textContent = t('status.fw.check.error',
            {msg: d.message || r.statusText});
          fwMsg.style.color = '#d93025';
        }
      } catch (_){
        fwMsg.textContent = t('status.fw.check.error', {msg: 'Network error'});
        fwMsg.style.color = '#d93025';
      } finally {
        fwCheck.disabled  = false;
        fwPick.disabled   = false;
        fwUpload.disabled = !fwFile.files[0];
      }
    };
  }
}

async function onFritzboxSubmit(e){
  e.preventDefault();
  const msg = $('fbMsg');
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  msg.textContent = t('sip.fb.working');
  msg.style.color = '#888';
  const r = await postForm('/api/fritzbox-setup', e.target);
  if (r.ok){

    msg.textContent = n ? t('sip.fb.done.withnum', {n}) : t('sip.fb.done');
    msg.style.color = '#188038';
    setTimeout(() => location.hash = '#/', 800);
    return;
  }

    e.target.querySelector('input[name=fritz_pass]').value = '';
    msg.innerHTML = esc(t('sip.fb.2fa.instructions', {hints: ''}))
                  + render2FAInstructions(r.data.methods || '');

function render2FAInstructions(methods){
  const hints = [];
  if (/\bbutton\b/.test(methods)) hints.push(esc(t('sip.fb.2fa.button')));
  const dtmf = methods.match(/dtmf;(\S+)/);
  if (dtmf) hints.push(t('sip.fb.2fa.dtmf', {seq: '<code>' + esc(dtmf[1]) + '</code>'}));
  return hints.length ? hints.join(' ' + esc('oder') + ' ') : '';
}

async function poll2FA(msgEl, btn){
  const deadline = Date.now() + 130 * 1000;
  while (Date.now() < deadline){
    await new Promise(r => setTimeout(r, 2000));
    const r = await fetchJson('/api/fritzbox-2fa-status');
    if (!r) continue;
    if (r.ok){
      const n = r.internal_number;
      msgEl.textContent = n ? t('sip.fb.done.withnum', {n}) : t('sip.fb.done');
      msgEl.style.color = '#188038';
      setTimeout(() => location.hash = '#/', 800);
      return;
    }
    if (r.terminal){
      msgEl.textContent = t('sip.fb.error', {msg: r.message || t('sip.fb.2fa.cancelled')});
      msgEl.style.color = '#d93025';
      btn.disabled = false;
      return;
    }
  }
  msgEl.textContent = t('sip.fb.2fa.timeout');
  msgEl.style.color = '#d93025';
  btn.disabled = false;
}

// --- announcement (G.711 A-law, 8 kHz mono) ------------------------

const ANN_MAX_SECONDS = 30;

// ITU-T G.711 A-law encode: 16-bit PCM → 8-bit A-law.
function pcm16ToAlaw(sample){
  const sign = (sample >> 8) & 0x80;
  if (sign) sample = -sample;
  if (sample > 32635) sample = 32635;
  let exponent, mantissa;
  if (sample >= 256){
    exponent = 7;
    for (let mask = 0x4000; (sample & mask) === 0 && exponent > 1; mask >>= 1) exponent--;
    mantissa = (sample >> (exponent + 3)) & 0x0f;
  } else {
    exponent = 0;
    mantissa = (sample >> 4) & 0x0f;
  }
  return (sign | (exponent << 4) | mantissa) ^ 0x55;
}

function alawToPcm16(alaw){
  alaw ^= 0x55;
  const sign = alaw & 0x80;
  const exponent = (alaw >> 4) & 0x07;
  const mantissa = alaw & 0x0f;
  let sample;
  if (exponent === 0){
    sample = (mantissa << 4) + 8;
  } else {
    sample = ((mantissa << 4) + 0x108) << (exponent - 1);
  }
  return sign ? -sample : sample;
}

// Wrap a PCM16 mono 8 kHz sample array into a Blob the browser's
// <audio> element plays natively.
function wavBlobFromPcm16(pcm){
  const dataBytes = pcm.length * 2;
  const buf = new ArrayBuffer(44 + dataBytes);
  const v = new DataView(buf);
  // RIFF header
  v.setUint32(0,  0x52494646, false); // "RIFF"
  v.setUint32(4,  36 + dataBytes, true);
  v.setUint32(8,  0x57415645, false); // "WAVE"
  // fmt chunk
  v.setUint32(12, 0x666d7420, false); // "fmt "
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);           // PCM
  v.setUint16(22, 1, true);           // mono
  v.setUint32(24, 8000, true);        // rate
  v.setUint32(28, 16000, true);       // byte rate = 8000 * 2
  v.setUint16(32, 2, true);           // block align
  v.setUint16(34, 16, true);          // bits
  v.setUint32(36, 0x64617461, false); // "data"
  v.setUint32(40, dataBytes, true);
  for (let i = 0; i < pcm.length; i++) v.setInt16(44 + i * 2, pcm[i], true);
  return new Blob([buf], {type: 'audio/wav'});
}

// Decode any browser-supported audio file, mix to mono, resample to
// 8 kHz via OfflineAudioContext, then A-law-encode. Returns a
// Uint8Array of raw A-law bytes ready to POST to /api/announcement.
async function convertToAlaw(file){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try {
    decoded = await ctx.decodeAudioData(await file.arrayBuffer());
  } catch (e){
    ctx.close();
    throw new Error(t('status.ann.upload.decode_fail'));
  }
  const lengthSamples = Math.ceil(decoded.duration * 8000);
  if (decoded.duration > ANN_MAX_SECONDS){
    ctx.close();
    throw new Error(t('status.ann.upload.toolong', {s: ANN_MAX_SECONDS}));
  }
  const off = new OfflineAudioContext(1, lengthSamples, 8000);
  const src = off.createBufferSource();
  src.buffer = decoded;
  src.connect(off.destination);
  src.start();
  const rendered = await off.startRendering();
  ctx.close();
  const f32 = rendered.getChannelData(0);
  const out = new Uint8Array(f32.length);
  for (let i = 0; i < f32.length; i++){
    let s = Math.round(Math.max(-1, Math.min(1, f32[i])) * 32767);
    out[i] = pcm16ToAlaw(s);
  }
  return out;
}

let annAudio = null;
let annMsgTimer = null;
function setAnnMsg(text, color){
  const el = $('annMsg');
  if (annMsgTimer){ clearTimeout(annMsgTimer); annMsgTimer = null; }
  el.textContent = text || '';
  el.style.color = color || '#888';
}

function wireAnnouncement(){
  const playBtn  = $('annPlay');
  const stopBtn  = $('annStop');
  const resetBtn = $('annReset');
  const fileIn   = $('annFile');
  const uploadBtn = $('annUpload');

  playBtn.onclick = async () => {
    setAnnMsg('');
    try {
      const r = await fetch('/api/announcement');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const alaw = new Uint8Array(await r.arrayBuffer());
      const pcm = new Int16Array(alaw.length);
      for (let i = 0; i < alaw.length; i++) pcm[i] = alawToPcm16(alaw[i]);
      const url = URL.createObjectURL(wavBlobFromPcm16(pcm));
      if (annAudio){ annAudio.pause(); URL.revokeObjectURL(annAudio.src); }
      annAudio = new Audio(url);
      annAudio.onended = () => {
        URL.revokeObjectURL(url);
        stopBtn.style.display = 'none';
        playBtn.style.display = '';
      };
      annAudio.play();
      playBtn.style.display = 'none';
      stopBtn.style.display = '';
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message || 'network'}), '#d93025');
    }
  };
  stopBtn.onclick = () => {
    if (annAudio){ annAudio.pause(); annAudio.currentTime = 0; }
    stopBtn.style.display = 'none';
    playBtn.style.display = '';
  };

  fileIn.onchange = () => { uploadBtn.disabled = !fileIn.files.length; };

  uploadBtn.onclick = async () => {
    if (!fileIn.files.length) return;
    const file = fileIn.files[0];
    uploadBtn.disabled = true;
    setAnnMsg(t('status.ann.upload.converting'), '#888');
    let alaw;
    try {
      alaw = await convertToAlaw(file);
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message}), '#d93025');
      uploadBtn.disabled = false;
      return;
    }
    setAnnMsg(t('status.ann.upload.uploading'), '#888');
    try {
      const r = await fetch('/api/announcement', {
        method: 'POST',
        headers: {'Content-Type': 'application/octet-stream'},
        body: alaw,
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok || !d.ok) throw new Error(d.message || ('HTTP ' + r.status));
      setAnnMsg(t('status.ann.upload.done', {kb: Math.round(alaw.length / 1024)}), '#188038');
      fileIn.value = '';
      annMsgTimer = setTimeout(() => setAnnMsg(''), 4000);
      refreshAll();
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message || 'network'}), '#d93025');
    }
    uploadBtn.disabled = !fileIn.files.length;
  };

  resetBtn.onclick = async () => {
    if (!confirm(t('status.ann.reset.confirm'))) return;
    resetBtn.disabled = true;
    setAnnMsg('');
    try {
      const r = await fetch('/api/announcement/reset', {method: 'POST'});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      refreshAll();
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message || 'network'}), '#d93025');
    }
    resetBtn.disabled = false;
  };
}
