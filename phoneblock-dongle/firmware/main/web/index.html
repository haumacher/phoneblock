// --- announcement (G.711 A-law, 8 kHz mono) ------------------------

const ANN_MAX_SECONDS = 30;

// ITU-T G.711 A-law encode: 16-bit PCM → 8-bit A-law.
function pcm16ToAlaw(sample){
  const sign = (sample >> 8) & 0x80;
  if (sign) sample = -sample;
  if (sample > 32635) sample = 32635;
  let exponent, mantissa;
  if (sample >= 256){
    exponent = 7;
    for (let mask = 0x4000; (sample & mask) === 0 && exponent > 1; mask >>= 1) exponent--;
    mantissa = (sample >> (exponent + 3)) & 0x0f;
  } else {
    exponent = 0;
    mantissa = (sample >> 4) & 0x0f;
  }
  return (sign | (exponent << 4) | mantissa) ^ 0x55;
}

function alawToPcm16(alaw){
  alaw ^= 0x55;
  const sign = alaw & 0x80;
  const exponent = (alaw >> 4) & 0x07;
  const mantissa = alaw & 0x0f;
  let sample;
  if (exponent === 0){
    sample = (mantissa << 4) + 8;
  } else {
    sample = ((mantissa << 4) + 0x108) << (exponent - 1);
  }
  return sign ? -sample : sample;
}

// Wrap a PCM16 mono 8 kHz sample array into a Blob the browser's
// <audio> element plays natively.
function wavBlobFromPcm16(pcm){
  const dataBytes = pcm.length * 2;
  const buf = new ArrayBuffer(44 + dataBytes);
  const v = new DataView(buf);
  // RIFF header
  v.setUint32(0,  0x52494646, false); // "RIFF"
  v.setUint32(4,  36 + dataBytes, true);
  v.setUint32(8,  0x57415645, false); // "WAVE"
  // fmt chunk
  v.setUint32(12, 0x666d7420, false); // "fmt "
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);           // PCM
  v.setUint16(22, 1, true);           // mono
  v.setUint32(24, 8000, true);        // rate
  v.setUint32(28, 16000, true);       // byte rate = 8000 * 2
  v.setUint16(32, 2, true);           // block align
  v.setUint16(34, 16, true);          // bits
  v.setUint32(36, 0x64617461, false); // "data"
  v.setUint32(40, dataBytes, true);
  for (let i = 0; i < pcm.length; i++) v.setInt16(44 + i * 2, pcm[i], true);
  return new Blob([buf], {type: 'audio/wav'});
}

// Decode any browser-supported audio file, mix to mono, resample to
// 8 kHz via OfflineAudioContext, then A-law-encode. Returns a
// Uint8Array of raw A-law bytes ready to POST to /api/announcement.
async function convertToAlaw(file){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try {
    decoded = await ctx.decodeAudioData(await file.arrayBuffer());
  } catch (e){
    ctx.close();
    throw new Error(t('status.ann.upload.decode_fail'));
  }
  const lengthSamples = Math.ceil(decoded.duration * 8000);
  if (decoded.duration > ANN_MAX_SECONDS){
    ctx.close();
    throw new Error(t('status.ann.upload.toolong', {s: ANN_MAX_SECONDS}));
  }
  const off = new OfflineAudioContext(1, lengthSamples, 8000);
  const src = off.createBufferSource();
  src.buffer = decoded;
  src.connect(off.destination);
  src.start();
  const rendered = await off.startRendering();
  ctx.close();
  const f32 = rendered.getChannelData(0);
  const out = new Uint8Array(f32.length);
  for (let i = 0; i < f32.length; i++){
    let s = Math.round(Math.max(-1, Math.min(1, f32[i])) * 32767);
    out[i] = pcm16ToAlaw(s);
  }
  return out;
}

let annAudio = null;
let annMsgTimer = null;
function setAnnMsg(text, color){
  const el = $('annMsg');
  if (annMsgTimer){ clearTimeout(annMsgTimer); annMsgTimer = null; }
  el.textContent = text || '';
  el.style.color = color || '#888';
}

function wireAnnouncement(){
  const playBtn  = $('annPlay');
  const stopBtn  = $('annStop');
  const resetBtn = $('annReset');
  const fileIn   = $('annFile');
  const uploadBtn = $('annUpload');

  playBtn.onclick = async () => {
    setAnnMsg('');
    try {
      const r = await fetch('/api/announcement');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const alaw = new Uint8Array(await r.arrayBuffer());
      const pcm = new Int16Array(alaw.length);
      for (let i = 0; i < alaw.length; i++) pcm[i] = alawToPcm16(alaw[i]);
      const url = URL.createObjectURL(wavBlobFromPcm16(pcm));
      if (annAudio){ annAudio.pause(); URL.revokeObjectURL(annAudio.src); }
      annAudio = new Audio(url);
      annAudio.onended = () => {
        URL.revokeObjectURL(url);
        stopBtn.style.display = 'none';
        playBtn.style.display = '';
      };
      annAudio.play();
      playBtn.style.display = 'none';
      stopBtn.style.display = '';
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message || 'network'}), '#d93025');
    }
  };
  stopBtn.onclick = () => {
    if (annAudio){ annAudio.pause(); annAudio.currentTime = 0; }
    stopBtn.style.display = 'none';
    playBtn.style.display = '';
  };

  fileIn.onchange = () => { uploadBtn.disabled = !fileIn.files.length; };

  uploadBtn.onclick = async () => {
    if (!fileIn.files.length) return;
    const file = fileIn.files[0];
    uploadBtn.disabled = true;
    setAnnMsg(t('status.ann.upload.converting'), '#888');
    let alaw;
    try {
      alaw = await convertToAlaw(file);
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message}), '#d93025');
      uploadBtn.disabled = false;
      return;
    }
    setAnnMsg(t('status.ann.upload.uploading'), '#888');
    try {
      const r = await fetch('/api/announcement', {
        method: 'POST',
        headers: {'Content-Type': 'application/octet-stream'},
        body: alaw,
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok || !d.ok) throw new Error(d.message || ('HTTP ' + r.status));
      setAnnMsg(t('status.ann.upload.done', {kb: Math.round(alaw.length / 1024)}), '#188038');
      fileIn.value = '';
      annMsgTimer = setTimeout(() => setAnnMsg(''), 4000);
      refreshAll();
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message || 'network'}), '#d93025');
    }
    uploadBtn.disabled = !fileIn.files.length;
  };

  resetBtn.onclick = async () => {
    if (!confirm(t('status.ann.reset.confirm'))) return;
    resetBtn.disabled = true;
    setAnnMsg('');
    try {
      const r = await fetch('/api/announcement/reset', {method: 'POST'});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      refreshAll();
    } catch (e){
      setAnnMsg(t('status.ann.upload.error', {msg: e.message || 'network'}), '#d93025');
    }
    resetBtn.disabled = false;
  };
}

// --- language switcher ---------------------------------------------

{
  const sel = document.getElementById('langSelect');
  if (sel){
    sel.value = LANG;
    sel.addEventListener('change', () => {
      const lang = sel.value;
      // The UI language is a DEVICE setting — it also drives the status mail
      // and the answer-bot announcement. POST it; the firmware localizes those
      // and downloads the matching UI pack, which the dongle then serves at
      // /api/i18n/ui. Re-render now (English until the pack arrives), then poll
      // the device for the new pack.
      LANG = lang;
      document.documentElement.lang = lang;
      try {
        fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({ ui_lang: lang }).toString(),
        }).catch(() => {});
      } catch (_){}
      delete I18N[lang];                 // force reload of the new locale
      // While the device downloads the new pack it serves the embedded English
      // pack (which carries the i18n.loading/unavailable strings), so start the
      // poll only after loadUiPack has populated I18N[lang] — then the status
      // label resolves to real text instead of the raw key on the first switch.
      loadUiPack(lang).then(() => { route(); awaitUiPack(lang); });
    });
  }
  document.documentElement.lang = LANG;
}

// --- boot ----------------------------------------------------------

// The UI language comes from the device (ui_lang); load it + its UI pack from
// the dongle itself (same-origin, no CDN), then render. On any failure t()
// falls back to the embedded English pack the device serves.
loadDeviceLang().then(route);
