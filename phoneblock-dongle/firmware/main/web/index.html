<body>
<header>
  <img src="/ab-logo-bot.svg" alt="" width="32" height="32">
  <h1>PhoneBlock Dongle</h1>
  <a href="#/" id="homeLink"></a>
</header>
<main id="app"></main>
<footer>
  PhoneBlock Dongle · <a href="https://phoneblock.net">phoneblock.net</a> ·
  <select id="langSelect" style="font-size:.8rem;border:none;background:transparent;color:#888">
    <option value="de">Deutsch</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
    <option value="es">Español</option>
    <option value="it">Italiano</option>
    <option value="nl">Nederlands</option>
    <option value="pl">Polski</option>
    <option value="sv">Svenska</option>
    <option value="da">Dansk</option>
    <option value="nb">Norsk bokmål</option>
    <option value="uk">Українська</option>
    <option value="el">Ελληνικά</option>
    <option value="ar">العربية</option>
    <option value="zh">中文</option>

<script>
// --- i18n -----------------------------------------------------------

const I18N = {};

// The UI language is the device's ui_lang. All strings are loaded at runtime
// from the dongle (/api/i18n/ui); nothing is baked into this page. The device
// serves the active locale's pack, or the embedded English pack as a fallback,
// so t() falls back to the English pack (always present) then to the key.
let LANG = 'en';   // the device's ui_lang, filled in from /api/status on boot
const t = (k, p) => {
  // (… || {}) so a locale still loading can't throw.
  let s = (I18N[LANG] || {})[k];
  if (s === undefined) s = (I18N.en || {})[k];
  if (s === undefined) return k;
  if (p) for (const [name, val] of Object.entries(p))
    s = s.replaceAll('{' + name + '}', val);
  return s;
};

// The UI language is a DEVICE setting (ui_lang — it also drives the status
// mail and the answer-bot announcement). NOTHING is baked into this page: the
// dongle serves the strings for its ui_lang from /api/i18n/ui (same-origin) —
// either the locale pack the firmware downloaded to SPIFFS, or the baked-in
// English fallback (from i18n/l10n/ui/ui_en.arb) when that locale isn't
// available yet. So a configured dongle needs no CDN at runtime (issue #460).
//
// Each served pack carries "@@locale"; while a just-selected locale is still
// downloading (or offline), the device serves the English fallback
// (@@locale:"en"), a readable placeholder — we keep polling until it serves
// the real locale. German is a normal downloaded locale (no special-casing).
function storePack(reqLang, dict){
  if (!dict || typeof dict !== 'object') return null;
  const loc = dict['@@locale'] || reqLang;
  I18N[loc] = dict;        // under the actual served locale (populates en too)
  I18N[reqLang] = dict;    // and under what was asked, so t(LANG) resolves
  return loc;
}
// Switching language is not instant: the device downloads the new pack (UI +
// mail + audio, several seconds) before /api/i18n/ui serves it. Without feedback
// a user picks a language and "nothing happens". Show a prominent bubble below
// the PhoneBlock token display — orange "loading" while we poll, which simply
// DISAPPEARS once the real pack renders (no "OK" noise), or a red note if it
// never arrives (the page then stays on the embedded English pack). The text
// resolves via t()'s English fallback, so it is readable even before the chosen
// locale's pack exists.
//
// The state is global so it survives a route()/renderStatus rebuild: the bubble
// element is recreated by renderStatus, which then calls applyLangStatus() to
// restore the current state.
let g_i18nStatus = '';   // '' | 'loading' | 'unavailable'
function setLangStatus(kind){ g_i18nStatus = kind || ''; applyLangStatus(); }
function applyLangStatus(){
  const el = document.getElementById('langStatus');   // only on the status page
  if (!el) return;
  if (!g_i18nStatus) { el.style.display = 'none'; el.textContent = ''; return; }
  el.textContent = g_i18nStatus === 'loading' ? t('i18n.loading') : t('i18n.unavailable');
  el.style.background = g_i18nStatus === 'loading' ? '#e67e22' : '#c0392b';
  el.style.display = '';
}
function loadUiPack(lang){
  if (!lang) return Promise.resolve();
  return fetch('/api/i18n/ui')
    .then(r => r.ok ? r.json() : null)
    .then(dict => { storePack(lang, dict); })
    .catch(() => { /* device unreachable → keys via t(); page is from it */ });
}
// Read the device's ui_lang from /api/status, reflect it in the selector, load
// its UI pack, and (if only the fallback was served) poll until the real
// locale pack downloads.
function loadDeviceLang(){
  return fetch('/api/status').then(r => r.ok ? r.json() : null).then(d => {
    LANG = (d && d.ui_lang) ? String(d.ui_lang) : 'en';
    document.documentElement.lang = LANG;
    const sel = document.getElementById('langSelect');
    if (sel) sel.value = LANG;
    return loadUiPack(LANG).then(() => awaitUiPack(LANG));
  }).catch(() => {});
}
// The firmware downloads the active locale's pack; the device serves the
// English fallback meanwhile. Poll until it serves the real locale
// (@@locale === lang), then re-render. Bounded so it can't spin forever.
// (en is the embedded fallback → already "real", so it stops immediately.)
function awaitUiPack(lang, tries){
  tries = tries || 0;
  if (LANG !== lang) return;                          // user switched again
  if (I18N[lang] && I18N[lang]['@@locale'] === lang) { setLangStatus(''); return; }
  if (tries > 30) { setLangStatus('unavailable'); return; }  // gave up polling
  setLangStatus('loading');
  setTimeout(() => {
    if (LANG !== lang) return;
    fetch('/api/i18n/ui').then(r => r.ok ? r.json() : null).then(dict => {
      if (LANG !== lang) return;
      if (storePack(lang, dict) === lang) { setLangStatus(''); route(); }
      else awaitUiPack(lang, tries + 1);
    }).catch(() => awaitUiPack(lang, tries + 1));
  }, 2000);
}

// --- helpers --------------------------------------------------------

const $ = id => document.getElementById(id);

function esc(s){
  if (s === null || s === undefined || s === '') return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;');
}

// Render the firmware version as a link to its release notes on GitHub.
// A clean release (1.3.4) or a pre-release (1.3.4-rc1) links to the
// suffix-stripped base — so an rc points at the upcoming X.Y.Z notes
// (which release.sh requires to exist). A git-describe dev build
// ("1.3.4-5-gabcdef", note the second hyphen) and the "–" placeholder
// stay plain text. Returns an HTML fragment, so the caller must assign
// it via innerHTML (with the other fields escaped).
function fwLink(v){
  v = v || '–';
  const m = v.match(/^(\d+\.\d+\.\d+)(?:-[0-9A-Za-z.]+)?$/);
  if (!m) return esc(v);
  const url = 'https://github.com/haumacher/phoneblock/blob/master/'
            + 'phoneblock-dongle/firmware/release-notes/' + m[1] + '.md';
  return '<a href="' + esc(url) + '" target="_blank" rel="noopener">'
       + esc(v) + '</a>';
}

function fmtSec(s){
  s = Math.max(0, Math.round(s));
  if (s < 60) return s + ' s';
  if (s < 3600) return Math.round(s/60) + ' min';
  if (s < 86400) return Math.round(s/3600) + ' h';
  return Math.round(s/86400) + ' T';
}

// Absolute point in time for an event the dongle reported as `ageS`
// seconds old. We reconstruct the instant from the *browser's* own wall
// clock (now - age) rather than the device clock: the browser always has
// an accurate time and the correct local zone, so the rendering works
// even before the dongle's SNTP sync and never disagrees with the user's
// own "today"/"yesterday". `withSeconds` adds second precision for the
// fine-grained log; the call list stays at minute precision.
function fmtClock(ageS, withSeconds){
  const locale = (typeof navigator !== 'undefined' && navigator.language) || LANG;
  const d = new Date(Date.now() - Math.max(0, ageS) * 1000);
  const time = d.toLocaleTimeString(locale, withSeconds
    ? {hour: '2-digit', minute: '2-digit', second: '2-digit'}
    : {hour: '2-digit', minute: '2-digit'});
  const midnight = x => { const c = new Date(x); c.setHours(0, 0, 0, 0); return c.getTime(); };
  const today = midnight(Date.now());
  const day   = midnight(d);
  if (day === today)             return t('status.time.today',     {time});
  if (day === today - 86400000)  return t('status.time.yesterday', {time});
  return d.toLocaleDateString(locale, {day: 'numeric', month: 'numeric'}) + ' ' + time;
}

async function fetchJson(url){
  try { const r = await fetch(url); return r.ok ? r.json() : null; }
  catch(e){ return null; }
}

// --- timezone (learn from the browser, push to the dongle) ----------
// The dongle's newlib has no IANA database, so it needs a POSIX TZ string
// ("CET-1CEST,M3.5.0,M10.5.0/3"), not "Europe/Berlin". Curated strings for
// the zones we serve give a canonical result for the European majority
// (matching the firmware default exactly → no spurious "change?" button);
// browserPosixTZ() derives one from the browser's own DST rules otherwise.
const CET = 'CET-1CEST,M3.5.0,M10.5.0/3';
const EET = 'EET-2EEST,M3.5.0/3,M10.5.0/4';
const BST = 'GMT0BST,M3.5.0/1,M10.5.0';
const TZ_TABLE = {
  'Europe/Berlin':CET,'Europe/Vienna':CET,'Europe/Zurich':CET,'Europe/Paris':CET,
  'Europe/Madrid':CET,'Europe/Rome':CET,'Europe/Amsterdam':CET,'Europe/Brussels':CET,
  'Europe/Luxembourg':CET,'Europe/Warsaw':CET,'Europe/Prague':CET,'Europe/Budapest':CET,
  'Europe/Copenhagen':CET,'Europe/Stockholm':CET,'Europe/Oslo':CET,'Europe/Belgrade':CET,
  'Europe/Ljubljana':CET,'Europe/Bratislava':CET,'Europe/Zagreb':CET,'Europe/Sarajevo':CET,
  'Europe/London':BST,'Europe/Dublin':BST,'Europe/Lisbon':'WET0WEST,M3.5.0/1,M10.5.0',
  'Europe/Athens':EET,'Europe/Helsinki':EET,'Europe/Bucharest':EET,'Europe/Kiev':EET,
  'Europe/Kyiv':EET,'Europe/Riga':EET,'Europe/Sofia':EET,'Europe/Tallinn':EET,'Europe/Vilnius':EET,
  'Europe/Moscow':'MSK-3','Europe/Istanbul':'<+03>-3','UTC':'UTC0','Etc/UTC':'UTC0',
};

function detectZone(){
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ''; }
  catch(_){ return ''; }
}

function browserPosixTZ(){
  const z = detectZone();
  if (TZ_TABLE[z]) return TZ_TABLE[z];
  try {
    const y = new Date().getFullYear();
    const offAt = d => -d.getTimezoneOffset();          // minutes east of UTC
    const jan = offAt(new Date(y,0,1,12)), jul = offAt(new Date(y,6,1,12));
    const std = Math.min(jan,jul), dst = Math.max(jan,jul);
    const fmt = mins => {                                // POSIX: west positive
      const tot = -mins, sign = tot<0?'-':'+', a = Math.abs(tot);
      const hh = Math.floor(a/60), mm = a%60;
      return sign + hh + (mm ? ':'+String(mm).padStart(2,'0') : '');
    };
    const abbr = m => {
      try {
        const p = new Intl.DateTimeFormat('en',{timeZoneName:'short'})
          .formatToParts(new Date(y,m,1)).find(x=>x.type==='timeZoneName');
        return p && /^[A-Za-z]{2,5}$/.test(p.value) ? p.value : null;
      } catch(_){ return null; }
    };
    const stdName = abbr(0) || ('<'+fmt(std)+'>');
    if (std === dst) return stdName + fmt(std);          // no DST
    const dstName = abbr(6) || ('<'+fmt(dst)+'>');
    let prev = offAt(new Date(y,0,1,12)); const tr = [];
    for (let m=0;m<12;m++){
      const dim = new Date(y,m+1,0).getDate();
      for (let d=1;d<=dim;d++){
        const cur = offAt(new Date(y,m,d,12));
        if (cur !== prev){ tr.push({date:new Date(y,m,d), inc:cur>prev}); prev=cur; }
      }
    }
    const spring = tr.find(x=>x.inc), fall = tr.find(x=>!x.inc);
    if (!spring || !fall) return null;
    const rule = dt => {
      const m = dt.getMonth()+1, dow = dt.getDay(), dom = dt.getDate();
      const dim = new Date(dt.getFullYear(),m,0).getDate();
      let wk = Math.ceil(dom/7); if (dom+7 > dim) wk = 5;   // 5 = last
      return 'M'+m+'.'+wk+'.'+dow;
    };
    return stdName+fmt(std)+dstName+fmt(dst)+','+rule(spring.date)+','+rule(fall.date);
  } catch(_){ return null; }
}

let g_tzPosix;   // computed once, lazily
function applyTz(deviceTz){
  const cur = $('tzCurrent'), btn = $('tzApply');
  if (!cur || !btn) return;
  cur.textContent = t('status.tz.current', { tz: deviceTz || '–' });
  if (g_tzPosix === undefined) g_tzPosix = browserPosixTZ();
  if (g_tzPosix && deviceTz && g_tzPosix !== deviceTz){
    btn.style.display = '';
    btn.textContent = t('status.tz.apply', { zone: detectZone() || g_tzPosix });
    btn.onclick = async () => {
      btn.disabled = true;
      const body = new URLSearchParams();
      body.append('timezone', g_tzPosix);
      try {
        const r = await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
        if (r.ok) cur.textContent = t('status.tz.saved');
      } catch(_){ /* next poll reconciles */ }
      btn.disabled = false;
      refreshAll();   // re-reads the device tz; hides the button once applied
    };
  } else {
    btn.style.display = 'none';
  }
}

async function postForm(url, form){
  const body = new URLSearchParams();
  for (const [k, v] of new FormData(form).entries()) body.append(k, v);
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString(),
    });
    const d = await r.json().catch(() => ({}));
    return { ok: r.ok && d.ok, data: d, statusText: r.statusText };
  } catch (err) {
    return { ok: false, data: {}, statusText: 'Network error' };
  }
}

// --- provider presets (PROVIDERS.md) --------------------------------

// Transport is always connection-oriented (TLS or TCP), never UDP: only a
// persistent connection lets the registrar push an incoming INVITE back
// through the NAT of a home router. UDP registers fine but cannot receive
// calls behind a router, so it is useless for the dongle's purpose.
//
// `port: 0` means "auto" — the firmware resolves the endpoint via DNS-SRV
// and uses the port the SRV record advertises. Telekom only publishes an
// SRV record (_sips._tcp.tel.t-online.de) and no A record on the bare
// domain, so a hard-coded port would skip SRV and the direct A lookup
// would fail (#363). `anonymous: true` registers via anonymous@t-online.de
// with no password — the simplest path for the user, who then only types
// the phone number.
const PROVIDERS = {
  telekom: {
    name: 'Telekom MagentaZuhause',
    host: 'tel.t-online.de',
    port: 0,
    transport: 'tls',
    authUser: 'anonymous@t-online.de',
    anonymous: true,
    // Telekom's own STUN — lets the dongle advertise its real post-NAT RTP
    // port in the SDP instead of the unmapped local port.
    stun: 'stun.t-online.de:3478',
    userHint: 'Rufnummer im Format +49… (E.164). Kein Passwort nötig — die Anmeldung erfolgt anonym (anonymous@t-online.de).',
  },
  einsundeins: {
    name: '1&1',
    host: 'sip.1und1.de',
    port: 5060,
    transport: 'tcp',
    stun: 'stun.1und1.de:3478',
    userHint: 'Format: 49…, ohne „+" und ohne führende 0. Passwort = „Telefoniepasswort" aus dem 1&1-Control-Center.',
  },
  sipgate: {
    name: 'sipgate',
    host: 'sipgate.de',
    port: 5060,
    transport: 'tcp',
    stun: 'stun.sipgate.net:10000',
    userHint: 'SIP-ID aus dem sipgate-Webportal. Passwort = separates SIP-Passwort.',
  },
  easybell: {
    name: 'easybell',
    host: 'voip.easybell.de',
    port: 5060,
    transport: 'tcp',
    // easybell documents that a STUN server is not required; left empty.
    userHint: 'SIP-Benutzer und -Passwort aus dem easybell-Kundenportal.',
  },
};

// --- router ---------------------------------------------------------

const app = $('app');
let pollTimer = null;
// True between the click on "Auf Aktualisierung prüfen" and the
// response from /api/firmware/check. firmware_try_update writes the
// pessimistic last_failed_ota marker *before* the download starts, so
// any /api/status poll that lands during the install would otherwise
// flash up the rollback banner for the version we are actively
// installing — which is the opposite of what the marker is meant to
// signal. The flag suppresses that banner while a check is in flight.
let fwUpdateInFlight = false;

function stopPolling(){
  if (pollTimer){ clearInterval(pollTimer); pollTimer = null; }
}

function route(){
  stopPolling();
  const hash = location.hash || '#/';
  const [_, section, subsection] = hash.split('/');
  const homeLink = $('homeLink');
  homeLink.textContent = hash === '#/' ? '' : t('back.status');
  if (section === 'setup' && subsection === 'sip'){
    const sub = hash.split('/')[3] || '';
    if (sub === 'fritzbox') return renderSipFritzbox();
    if (sub === 'provider') return renderSipProvider();
    if (sub === 'manual')   return renderSipManual();
    return renderSipEntry();
  }
  if (section === 'setup' && subsection === 'token') return renderToken();
  return renderStatus();
}

function renderHero(sipDone, tokenDone){
  const slot = $('heroSlot');
  if (!slot) return;
  const step = (done, num, labelKey, ctaKey, href) =>
      '<div class="hero-step' + (done ? ' done' : '') + '">'
    + '<div class="mark">' + (done ? '✓' : num) + '</div>'
    + '<div class="body"><strong>' + esc(t(labelKey)) + '</strong>'
    + (done ? '' : '<a class="btn-primary" href="' + href + '">'
                 + esc(t(ctaKey)) + '</a>')
    + '</div></div>';
  slot.innerHTML = ''
    + '<section class="hero">'
    + '<h2>' + esc(t('hero.title')) + '</h2>'
    + '<p>'  + esc(t('hero.intro')) + '</p>'
    + step(sipDone,   '1',
           sipDone   ? 'hero.step1.done' : 'hero.step1.todo',
           'hero.cta.sip',   '#/setup/sip')
    + step(tokenDone, '2',
           tokenDone ? 'hero.step2.done' : 'hero.step2.todo',
           'hero.cta.token', '#/setup/token')
    + '</section>';
}

// Latest per-boot factory-reset nonce, updated every status poll.
// Used in the /api/factory-reset POST body so that a POST replayed
// by the browser across a reboot carries a now-stale value.
let resetNonce = '';

// The status-email form is prefilled from /api/status exactly once per
// dashboard build (reset in the build function above), so the 3s poll
// does not overwrite what the user is typing.
let mailPrefilled = false;

// IDs of sections that the dashboard shows or hides on each poll, so
// we can toggle the entire dashboard visibility in one go when the
// gate kicks us out (401 from /api/status).
const DASHBOARD_SECTIONS = ['heroSlot', 'statusSection', 'callsSection',
  'thresholdsSection', 'errorsSection', 'resetSection', 'annSection',
  'localCacheSection', 'syncSection', 'fwSection', 'mailSection', 'authSection'];

// Maps `?login_error=<code>` query values that web_auth_handle_callback
// emits to localized text shown in the login section's red banner.
const LOGIN_ERROR_KEYS = {
  mismatch: 'login.error.mismatch',
  rejected: 'login.error.rejected',
  expired:  'login.error.expired',
  persist:  'login.error.persist',
  missing:  'login.error.missing',
};

// True once a callback error has been surfaced. Pins the SPA on the
// login screen so e.g. an activation persist failure (gate stays off,
// /api/status would return 200 → dashboard) cannot bury the error.
// Cleared by reloading the page (URL is stripped on first show).
let stickyLoginError = false;

function showLoginState(){
  const loginSec = $('loginSection');
  if (loginSec) loginSec.style.display = '';
  for (const id of DASHBOARD_SECTIONS){
    const el = $(id);
    if (el) el.style.display = 'none';
  }

  // Lazily wire the login button so the "stay signed in" checkbox is
  // forwarded to /auth/start as ?remember=1. Plain navigation works
  // unchanged when JS is disabled — server will just not remember.
  const loginBtn = $('loginButton');
  if (loginBtn && !loginBtn.onclick){
    loginBtn.onclick = (e) => {
      e.preventDefault();
      const remember = $('loginRemember') && $('loginRemember').checked;
      window.location.href = '/auth/start' + (remember ? '?remember=1' : '');
    };
  }

  // Surface a callback error once, then strip it from the URL so a
  // browser reload doesn't re-show a stale message. The DOM keeps it
  // visible via stickyLoginError until the user navigates away.
  const params = new URLSearchParams(location.search);
  const errCode = params.get('login_error');
  if (errCode){
    const expected = params.get('expected') || '';
    // For mismatch, the dongle attaches the pinned owner-name so the
    // banner can name it explicitly — much friendlier than a generic
    // "wrong account" message that leaves the user guessing which one.
    const key = (errCode === 'mismatch' && expected)
      ? 'login.error.mismatch_named'
      : (LOGIN_ERROR_KEYS[errCode] || 'login.error.generic');
    const errEl = $('loginError');
    if (errEl){
      errEl.textContent = t(key, {expected});
      errEl.style.display = '';
    }
    stickyLoginError = true;
    params.delete('login_error');
    params.delete('expected');
    const qs = params.toString();
    history.replaceState(null, '',
      location.pathname + (qs ? '?' + qs : '') + location.hash);
  }
}

function hideLoginState(){
  const loginSec = $('loginSection');
  if (loginSec) loginSec.style.display = 'none';
}

async function refreshAll(){
  // Sticky login error from a previous /auth/callback bounce — keep
  // the user on the login screen until they take action. Checked
  // before /api/status so a gate-off state (e.g. persist failure
  // during activation) can't immediately dismiss the banner. The URL
  // form covers the very first poll right after the redirect; the
  // sticky flag covers every subsequent poll once the URL is stripped.
  if (stickyLoginError || new URLSearchParams(location.search).has('login_error')){
    showLoginState();
    return;
  }
  const sResp = await fetch('/api/status').catch(() => null);
  if (sResp && sResp.status === 401){
    showLoginState();
    return;
  }
  const [s, calls, errs] = await Promise.all([
    sResp && sResp.ok ? sResp.json().catch(() => null) : null,
    fetchJson('/api/calls'),
    fetchJson('/api/errors'),
  ]);
  if (!s) return;
  hideLoginState();
  resetNonce = s.reset_nonce || '';
  const sipConfigured = !!(s.sip.host && s.sip.user);
  const tokenSet      = !!s.phoneblock.token_set;
  // token_ok defaults to true when the field is missing (older
  // firmware) so a stale frontend never falsely reports "rejected".
  const tokenOk       = s.phoneblock.token_ok !== false;
  const heroSlot      = $('heroSlot');
  const statusSec     = $('statusSection');
  const callsSec      = $('callsSection');
  const thresholdsSec = $('thresholdsSection');
  const errorsSec     = $('errorsSection');
  const resetSec      = $('resetSection');
  const annSec        = $('annSection');
  const syncSec       = $('syncSection');
  const localCacheSec = $('localCacheSection');
  const fwSec         = $('fwSection');
  const mailSec       = $('mailSection');
  const authSec       = $('authSection');
  if (!sipConfigured || !tokenSet){
    // Setup incomplete — show the hero with per-step progress until
    // both SIP and the PhoneBlock token are configured. The status
    // dashboard below would otherwise advertise a "ready" state that
    // the device cannot actually deliver.
    renderHero(sipConfigured, tokenSet);
    statusSec.style.display = 'none';
    callsSec.style.display = 'none';
    thresholdsSec.style.display = 'none';
    errorsSec.style.display = 'none';
    annSec.style.display = 'none';
    syncSec.style.display = 'none';
    localCacheSec.style.display = 'none';
    resetSec.style.display = 'none';
    fwSec.style.display = 'none';
    mailSec.style.display = 'none';
    authSec.style.display = 'none';
    return;
  }
  heroSlot.innerHTML = '';
  statusSec.style.display = '';
  callsSec.style.display = '';
  thresholdsSec.style.display = '';
  errorsSec.style.display = '';
  annSec.style.display = '';
  syncSec.style.display = '';
  localCacheSec.style.display = '';
  resetSec.style.display = '';
  fwSec.style.display = '';
  mailSec.style.display = '';
  authSec.style.display = '';

  // Local blocklist-cache section: status line + wildcards toggle +
  // manual "download now" button. The task runs daily on its own; the
  // button is for fresh setups where the user does not want to wait
  // for the next scheduled tick.
  const bl = s.blocklist || {};
  const blEnabled  = $('blEnabled');
  // Default to enabled when the field is absent (older firmware) so the
  // UI never mis-reports an active cache as off.
  const blOn = bl.enabled !== false;
  blEnabled.checked = blOn;
  const blStatus = $('localCacheStatus');
  const blAgo = bl.last_ago_s >= 0 ? fmtSec(bl.last_ago_s) : '–';
  if (!blOn){
    blStatus.textContent = t('status.localcache.disabled');
    blStatus.style.color = '#888';
  } else if (bl.running){
    blStatus.textContent = t('status.localcache.running');
    blStatus.style.color = '#e8710a';
  } else if (!bl.ever_ran && !bl.have_community && !bl.have_personal){
    blStatus.textContent = t('status.localcache.never');
    blStatus.style.color = '#888';
  } else if (bl.ever_ran && !bl.last_ok){
    blStatus.textContent = t('status.localcache.last_fail',
      {ago: blAgo, err: bl.last_error || '–'});
    blStatus.style.color = '#d93025';
  } else {
    blStatus.textContent = t('status.localcache.have',
      {community: bl.community_size || 0,
       personal:  bl.personal_size  || 0,
       ago:       blAgo});
    blStatus.style.color = '#188038';
  }
  const blWildcards = $('blWildcards');
  const blRun       = $('blRun');
  blWildcards.checked = !!bl.wildcards;
  // The wildcards toggle and the manual download only make sense while
  // the cache is on; grey them out when it is disabled.
  blWildcards.disabled = !blOn;
  blRun.disabled = !blOn || !!bl.running;
  if (!blEnabled.onchange){
    blEnabled.onchange = async () => {
      const want = blEnabled.checked;
      blEnabled.disabled = true;
      const body = new URLSearchParams();
      body.append('blocklist_enabled', want ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll reconciles */ }
      blEnabled.disabled = false;
      refreshAll();
    };
  }
  if (!blWildcards.onchange){
    blWildcards.onchange = async () => {
      const want = blWildcards.checked;
      blWildcards.disabled = true;
      const body = new URLSearchParams();
      body.append('blocklist_wildcards', want ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll reconciles */ }
      blWildcards.disabled = false;
      refreshAll();
    };
  }
  if (!blRun.onclick){
    blRun.onclick = async () => {
      const m = $('blMsg');
      blRun.disabled = true;
      m.textContent = '';
      try {
        const r = await fetch('/api/blocklist-sync/run', {method: 'POST'});
        const d = await r.json().catch(() => ({}));
        m.textContent = d.ok ? t('status.localcache.triggered')
                              : t('status.localcache.busy');
        m.style.color = d.ok ? '#188038' : '#e8710a';
      } catch (_){
        m.textContent = 'Network error';
        m.style.color = '#d93025';
      }
      refreshAll();
    };
  }

  // Blocklist sync section: show either "unavailable" (no FB app
  // creds in NVS), "never run", "running", "last ok", "last partial"
  // or "last failed". Status line is colour-coded; the manual
  // trigger button is always visible so the user can test.
  const sync = s.sync || {};
  const syncStatus = $('syncStatus');
  const syncRun    = $('syncRun');
  const syncEnable = $('syncEnable');
  const ago        = sync.last_ago_s >= 0 ? fmtSec(sync.last_ago_s) : '–';
  syncEnable.checked = !!sync.enabled;
  syncEnable.disabled = !sync.available;
  if (!sync.available){
    syncStatus.textContent = t('status.sync.unavailable');
    syncStatus.style.color = '#888';
    syncRun.disabled = true;
  } else if (!sync.enabled){
    // Auto sync off but the manual button stays available so the
    // user can still test or do one-off submissions.
    syncStatus.textContent = t('status.sync.disabled');
    syncStatus.style.color = '#888';
    syncRun.disabled = false;
  } else if (sync.running){
    syncStatus.textContent = t('status.sync.running');
    syncStatus.style.color = '#e8710a';
    syncRun.disabled = true;
  } else if (!sync.ever_ran){
    syncStatus.textContent = t('status.sync.never');
    syncStatus.style.color = '#888';
    syncRun.disabled = false;
  } else if (!sync.last_ok){
    syncStatus.textContent = t('status.sync.last_fail',
      {ago, err: sync.last_error || '–'});
    syncStatus.style.color = '#d93025';
    syncRun.disabled = false;
  } else if (sync.last_failed > 0){
    syncStatus.textContent = t('status.sync.last_partial',
      {ago, n: sync.last_pushed, f: sync.last_failed});
    syncStatus.style.color = '#e8710a';
    syncRun.disabled = false;
  } else {
    syncStatus.textContent = t('status.sync.last_ok',
      {ago, n: sync.last_pushed});
    syncStatus.style.color = '#188038';
    syncRun.disabled = false;
  }
  if (!syncEnable.onchange){
    syncEnable.onchange = async () => {
      const want = syncEnable.checked;
      syncEnable.disabled = true;
      const body = new URLSearchParams();
      body.append('sync_enabled', want ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll will reconcile */ }
      refreshAll();
    };
  }
  if (!syncRun.onclick){
    syncRun.onclick = async () => {
      const m = $('syncMsg');
      syncRun.disabled = true;
      m.textContent = '';
      try {
        const r = await fetch('/api/sync/run', {method: 'POST'});
        const d = await r.json().catch(() => ({}));
        m.textContent = d.ok ? t('status.sync.triggered') : t('status.sync.busy');
        m.style.color = d.ok ? '#188038' : '#e8710a';
      } catch (_){
        m.textContent = 'Network error';
        m.style.color = '#d93025';
      }
      // Next poll will reflect the "running" state and re-enable
      // the button when done.
    };
  }

  // Announcement subsection: show what's currently active + whether
  // the reset-to-default shortcut is meaningful.
  const ann = s.announcement || {custom: false, bytes: 0};
  const kb = Math.round(ann.bytes / 1024);
  $('annCurrent').textContent = ann.custom
    ? t('status.ann.custom',  {kb})
    : t('status.ann.default', {kb});
  $('annReset').style.display = ann.custom ? '' : 'none';
  if (!$('annPlay').onclick)  wireAnnouncement();

  // Accept-test-calls toggle: wired here rather than in
  // wireAnnouncement() because the persisted device flag flows
  // through the polled /api/status payload, not the announcement
  // upload helpers.
  const annAcceptTest = $('annAcceptTest');
  annAcceptTest.checked = ann.accept_test_calls === true;
  if (!annAcceptTest.onchange){
    annAcceptTest.onchange = async () => {
      const want = annAcceptTest.checked;
      annAcceptTest.disabled = true;
      const body = new URLSearchParams();
      body.append('accept_test_calls', want ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll will reconcile */ }
      annAcceptTest.disabled = false;
      refreshAll();
    };
  }

  // SIP pill + detail
  const sipPill = $('sipPill');
  const sipCta  = $('sipCta');
  if (!sipConfigured){
    sipPill.textContent = t('status.sip.not_configured');
    sipPill.className = 'pill bad';
    $('sipDetail').textContent = '';
    sipCta.textContent = t('status.sip.setup_cta');
  } else if (s.sip.registered){
    sipPill.textContent = t('status.sip.connected');
    sipPill.className = 'pill ok';
    const parts = [
      t('status.sip.since', {duration: fmtSec(s.sip.registered_for_s)}),
      t('status.sip.at', {host: s.sip.host, user: s.sip.user}),
    ];
    if (s.sip.internal_number){
      parts.push(t('status.sip.ext', {n: s.sip.internal_number}));
    }
    if (s.sip.public_ip){
      parts.push(t('status.sip.public_ip', {ip: s.sip.public_ip}));
    }
    if (s.sip.nat_mapping === 'endpoint-dependent'){
      parts.push(t('status.sip.nat_symmetric'));
    } else if (s.sip.stun){
      parts.push(t('status.sip.stun', {server: s.sip.stun, nat: s.sip.nat_mapping || 'unknown'}));
    }
    $('sipDetail').textContent = parts.join(' · ');
    sipCta.textContent = t('status.sip.redo_cta');
  } else {
    // Configured but not yet registered — treat as "connecting" while
    // the task retries in the background, rather than as a hard error.
    sipPill.textContent = t('status.sip.connecting');
    sipPill.className = 'pill warn';
    const parts = [ t('status.sip.at', {host: s.sip.host, user: s.sip.user}) ];
    if (s.sip.internal_number){
      parts.push(t('status.sip.ext', {n: s.sip.internal_number}));
    }
    $('sipDetail').textContent = parts.join(' · ');
    sipCta.textContent = t('status.sip.redo_cta');
  }
  // Always offer a way into the wizard — hiding the button on the
  // "happy path" leaves the user stranded when they need to change
  // the registrar or the admin password later.
  sipCta.style.display = '';

  // Token pill + actions
  const tokenPill  = $('tokenPill');
  const tokenCta   = $('tokenCta');
  const tokenTest  = $('tokenTest');
  const tokenRenew = $('tokenRenew');
  if (tokenSet){
    if (tokenOk){
      tokenPill.textContent = t('status.token.set');
      tokenPill.className = 'pill ok';
      // Don't clobber an inline test result the user may just have
      // produced — clear only when we are switching away from the
      // rejected state.
      const m = $('tokenMsg');
      if (m.dataset.persist === 'rejected'){
        m.textContent = '';
        m.style.color = '';
        delete m.dataset.persist;
      }
    } else {
      tokenPill.textContent = t('status.token.rejected');
      tokenPill.className = 'pill bad';
      const m = $('tokenMsg');
      m.textContent = t('status.token.rejected.msg');
      m.style.color = '#d93025';
      m.dataset.persist = 'rejected';
    }
    tokenCta.style.display   = 'none';
    tokenTest.style.display  = '';
    tokenRenew.style.display = '';
  } else {
    tokenPill.textContent = t('status.token.missing');
    tokenPill.className = 'pill bad';
    tokenCta.style.display   = '';
    tokenTest.style.display  = 'none';
    tokenRenew.style.display = 'none';
    $('tokenMsg').textContent = '';
  }
  if (!tokenTest.onclick){
    tokenTest.onclick = async () => {
      const m = $('tokenMsg');
      tokenTest.disabled = true;
      m.textContent = t('status.token.testing');
      m.style.color = '#888';
      try {
        const r = await fetch('/api/token-test', { method: 'POST' });
        const d = await r.json().catch(() => ({}));
        // Render the outcome from i18n instead of echoing the
        // server's English message — the server ships ok + a
        // stable result code so the UI stays localised.
        let key;
        if (d.ok)                   key = 'status.token.test.ok';
        else if (d.code === 'none') key = 'status.token.test.none';
        else                        key = 'status.token.test.fail';
        m.textContent = t(key);
        m.style.color = d.ok ? '#188038' : '#d93025';
      } catch (_){
        m.textContent = 'Network error';
        m.style.color = '#d93025';
      }
      tokenTest.disabled = false;
    };
  }

  $('cTotal').textContent = s.counters.total;
  $('cSpam').textContent  = s.counters.spam_blocked;
  $('cLegit').textContent = s.counters.legitimate;
  $('cErr').textContent   = s.counters.errors;
  // innerHTML so the version can be a link; all other interpolated
  // values are escaped, and the template itself is a trusted constant.
  $('statusInfo').innerHTML = t('status.info', {
    fw: fwLink(s.firmware_version),
    ip: esc(s.ip_address || '–'),
    uptime: esc(fmtSec(s.uptime_s)),
    api: esc(s.phoneblock.last_api_ms > 0 ? s.phoneblock.last_api_ms + ' ms' : '–'),
  });

  // System load / memory — diagnostic card. Surfaces a runaway task as a
  // high CPU% so "the dongle is hot/unstable" can be pinned, not guessed.
  if (s.system) {
    const kb = (n) => (n / 1024).toFixed(1) + ' KB';
    $('systemSection').style.display = '';
    $('systemHeap').textContent = t('status.system.heap', {
      free: kb(s.system.free_heap), min: kb(s.system.min_free_heap),
      largest: kb(s.system.largest_free_block),
    });
    if (s.system.fs_total != null) {
      $('systemFs').style.display = '';
      $('systemFs').textContent = t('status.system.fs', {
        free: kb(s.system.fs_free), total: kb(s.system.fs_total),
        used: kb(s.system.fs_used),
      });
    } else {
      $('systemFs').style.display = 'none';
    }
    const tb = $('systemTasks');
    tb.innerHTML = '';
    const tasks = (s.system.tasks || []).slice()
      .sort((a, b) => b.cpu_pct - a.cpu_pct);
    for (const tk of tasks) {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + esc(tk.name) + '</td>'
      + '<td style="text-align:right">' + tk.cpu_pct + '%</td>'
      + '<td style="text-align:right">' + tk.stack_free + '</td>';
      tb.appendChild(tr);
    }
  }

  // Wall clock + timezone.
  if (s.time) {
    const ci = $('clockInfo');
    if (ci) ci.textContent = s.time.valid
      ? t('status.clock.now', { time: (s.time.local || '').replace('T', ' ') })
      : t('status.clock.pending');
    applyTz(s.time.tz || '');
  }

  // Calls
  const tbody = $('callsBody');
  // PhoneBlock's web UI serves per-number detail pages at
  // <site>/nums/<zeroZero>. We don't link to phoneblock.net directly:
  // the dongle's broker /auth/login-link mints a one-shot login
  // ticket using the API token (which never leaves the dongle) and
  // 302s the browser.
  //
  // Two categories are kept off the public lookup so that they never
  // leak to phoneblock.net via clicks:
  //   - non-dialable numbers (internal Fritz!Box codes like *21#,
  //     **622) — same predicate the firmware uses to skip the API
  //     query in the first place.
  //   - phone-book matches the user added themselves (display name
  //     contains letters and is not the "SPAM" marker) — the user
  //     already knows who called; sending the contact's number to
  //     phoneblock.net just to render a public detail page would be
  //     careless with private contact data. Mirrors the C-side
  //     is_known_contact() so the UI agrees with sip_register.c on
  //     which numbers are "PhoneBlock-public".
  const isPhoneNumberLike = (s) => {
    if (!s) return false;
    let digit = false;
    for (const ch of s) {
      if (ch >= '0' && ch <= '9') { digit = true; continue; }
      if ('+ -/().\t'.indexOf(ch) >= 0) continue;
      return false;
    }
    return digit;
  };
  const isKnownContact = (display) => {
    if (!display) return false;
    if (isPhoneNumberLike(display)) return false;
    // Match the C is_known_contact(): trim leading whitespace, then
    // reject "SPAM" / "SPAM:" / "SPAM " (the AnswerBot.SPAM_MARKER the
    // CardDAV blocklist subscription stamps onto each entry).
    const trimmed = display.replace(/^[ \t]+/, '');
    if (/^spam([:\s\-_.]|$)/i.test(trimmed)) return false;
    return true;
  };
  const looksDialable = (num) => {
    if (!num) return false;
    const first = num[0];
    if (first === '+') return num.length > 1 && num[1] >= '0' && num[1] <= '9';
    return first >= '0' && first <= '9';
  };
  // For API-checked entries we wrap the number-column text (whatever
  // we display there) in a login-broker link to phoneblock.net's
  // detail page. Phone-book entries skip this step entirely so
  // private contacts never get round-tripped via phoneblock.net.
  const linkToNumber = (num, text) => {
    const next = '/nums/' + encodeURIComponent(num);
    return '<a href="/auth/login-link?next=' + encodeURIComponent(next)
         + '" target="_blank" rel="noopener">' + text + '</a>';
  };
  const numCell = (num, display) => {
    if (!num)                          return '';
    if (!looksDialable(num))           return esc(num);
    if (isKnownContact(display))       return esc(num);
    return linkToNumber(num, esc(num));
  };
  // Log characterisation → label. Mirrors verdict_label() in mail.c so
  // both surfaces read identically. `c.assessment` is the wire name from
  // web.c (assessment_string); the (Nummer)/(Bereich) qualifier comes from
  // `c.wildcard`, the direct/range counts from the community signal.
  const verdictLabel = (c) => {
    const scope = t(c.wildcard ? 'status.calls.verdict.scope.range'
                               : 'status.calls.verdict.scope.number');
    switch (c.assessment) {
      case 'blacklist': return t('status.calls.verdict.blacklist', {scope});
      case 'spam_list': return t('status.calls.verdict.spam_list', {scope});
      case 'spam':
        // Test-forced spam carries no counts — show plain "SPAM".
        return (c.direct_votes || c.range_votes)
          ? t('status.calls.verdict.spam', {direct: c.direct_votes, range: c.range_votes})
          : t('status.calls.verdict.spam_plain');
      case 'suspect':
        return t('status.calls.verdict.suspect', {direct: c.direct_votes, range: c.range_votes});
      case 'legitimate': return t('status.calls.verdict.legitimate');
      case 'error':      return t('status.calls.verdict.error');
      default:           return t('status.calls.verdict.unknown');
    }
  };
  // Colour class per assessment: spam/blacklist red, suspect orange,
  // legitimate green, unknown grey, error orange.
  const verdictClass = (a) => {
    switch (a) {
      case 'spam': case 'spam_list': case 'blacklist': return 'SPAM';
      case 'suspect':    return 'SUSPECT';
      case 'legitimate': return 'LEGITIMATE';
      case 'error':      return 'ERROR';
      default:           return 'UNKNOWN';
    }
  };
  const hasCalls = calls && calls.calls.length;
  if (hasCalls){
    tbody.innerHTML = calls.calls.map(c => {
      // API-checked entries carry a label/location from PhoneBlock;
      // phone-book matches and internal codes don't. Switch the
      // number- and name-columns to the PhoneBlock display variant
      // when it's available.
      const apiChecked = !!(c.label && c.label.length);
      const numCol = apiChecked
        ? linkToNumber(c.number, esc(c.label))
        : numCell(c.number, c.display);
      const nameCol = apiChecked
        ? esc(c.location)
        : esc(c.display);
      // Colour follows the assessment: SPAM-VERDACHT gets its own orange
      // v-SUSPECT (green would wrongly imply "fine"), an un-rated number
      // gets neutral v-UNKNOWN, and spam/blacklist share red.
      const verdictCls = verdictClass(c.assessment);
      return '<tr><td>' + esc(fmtClock(c.age_s, false)) + '</td>'
        + '<td>' + numCol + '</td>'
        + '<td>' + nameCol + '</td>'
        + '<td class="v-' + esc(verdictCls) + '">' + esc(verdictLabel(c)) + '</td></tr>';
    }).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="4" class="muted">' + esc(t('status.calls.empty')) + '</td></tr>';
  }
  const callsClearBtn = $('callsClear');
  callsClearBtn.style.display = hasCalls ? '' : 'none';
  if (!callsClearBtn.onclick){
    callsClearBtn.onclick = async () => {
      callsClearBtn.disabled = true;
      try { await fetch('/api/calls/clear', { method: 'POST' }); }
      catch (_){ /* next poll will reflect whatever state we end up in */ }
      await refreshAll();
      callsClearBtn.disabled = false;
    };
  }
  const callsLogKnown = $('callsLogKnown');
  // s.calls.log_known is the persisted device flag; default true so
  // bestand-dongles keep their current "list everything" behaviour.
  callsLogKnown.checked = !s || !s.calls || s.calls.log_known !== false;
  if (!callsLogKnown.onchange){
    callsLogKnown.onchange = async () => {
      const want = callsLogKnown.checked;
      callsLogKnown.disabled = true;
      const body = new URLSearchParams();
      body.append('log_known_calls', want ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll will reconcile */ }
      callsLogKnown.disabled = false;
      refreshAll();
    };
  }
  // Block thresholds. Both are dropdowns with the same fixed option set
  // the mobile app offers (direct 2/4/10/20/50/100, range Off/10/20/50/
  // 100/500). Limiting the choices keeps the server's community-binary
  // cache, keyed on the (minDirect, minRange) pair, shared across many
  // dongles. The selection saves on change. We only refresh the visible
  // value when the user is not currently editing the field — avoids the
  // polling loop snatching the value out from under them.
  const thrDirect = $('thrDirect');
  const thrRange  = $('thrRange');
  const thrMsg    = $('thrMsg');
  const pb = (s && s.phoneblock) || {};
  // Reflect the stored value. A value that predates the fixed option set
  // (e.g. a custom number from an older firmware) is rounded UP to the
  // nearest option (ceil), capped at the largest — the same ceil-clamp the
  // server applies — so the control shows the value actually in effect.
  const snapThr = (sel, val) => {
    if (val == null || document.activeElement === sel) return;
    const v = parseInt(val, 10);
    if (isNaN(v)) return;
    const opts = [...sel.options].map(o => parseInt(o.value, 10)).sort((a, b) => a - b);
    let chosen = opts[opts.length - 1];
    for (const o of opts) { if (v <= o) { chosen = o; break; } }
    sel.value = String(chosen);
  };
  snapThr(thrDirect, pb.min_direct_votes);
  snapThr(thrRange, pb.min_range_votes);
  const flashMsg = (text, color) => {
    thrMsg.textContent = text;
    thrMsg.style.color = color;
    setTimeout(() => { if (thrMsg.textContent === text) thrMsg.textContent = ''; }, 2000);
  };
  const saveThreshold = async (sel, field) => {
    const v = parseInt(sel.value, 10);
    if (isNaN(v)) return;
    sel.disabled = true;
    const body = new URLSearchParams();
    body.append(field, String(v));
    try {
      const r = await fetch('/api/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: body.toString(),
      });
      if (r.ok) flashMsg(t('status.thresholds.saved'), '#188038');
    } catch (_){ /* next poll reconciles */ }
    sel.disabled = false;
    refreshAll();
  };
  if (!thrDirect.onchange){
    thrDirect.onchange = () => saveThreshold(thrDirect, 'min_direct_votes');
  }
  if (!thrRange.onchange){
    thrRange.onchange = () => saveThreshold(thrRange, 'min_range_votes');
  }

  // Errors
  const list = $('errorsList');
  const clearBtn = $('errorsClear');
  const hasErrs = errs && errs.errors.length;
  if (hasErrs){
    list.innerHTML = errs.errors.map(e => {
      // Severity colours the left border + tag: error red, warning amber,
      // info grey. The .error-row class hard-codes a red border/tint, so
      // override both inline (otherwise info lines look alarming).
      const col = e.level === 'E' ? '#d93025'
                : e.level === 'W' ? '#e8830c' : '#888';
      const bg  = e.level === 'E' ? '#fffafa'
                : e.level === 'W' ? '#fffdf6' : '#fafafa';
      return '<div class="error-row" style="border-left-color:' + col
        + ';background:' + bg + '"><strong style="color:' + col + '">['
        + esc(e.tag) + ']</strong> ' + esc(e.message)
        + ' <span class="muted">'
        + esc(fmtClock(e.age_s, true)) + '</span></div>';
    }).join('');
  } else {
    list.innerHTML = '<p class="muted">' + esc(t('status.errors.empty')) + '</p>';
  }
  clearBtn.style.display = hasErrs ? '' : 'none';
  if (!clearBtn.onclick){
    clearBtn.onclick = async () => {
      clearBtn.disabled = true;
      try { await fetch('/api/errors/clear', { method: 'POST' }); }
      catch (_){ /* next poll will reflect whatever state we end up in */ }
      await refreshAll();
      clearBtn.disabled = false;
    };
  }

  // "Also log INFO" troubleshooting toggle. Reflect the stored state on
  // every poll; persist via /api/config on change.
  const logChk = $('logInfoChk');
  if (logChk){
    logChk.checked = !!(s.log && s.log.capture_info);
    logChk.onchange = async () => {
      const body = new URLSearchParams();
      body.append('log_info', logChk.checked ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll reconciles */ }
      refreshAll();
    };
  }

  // Status-LED quiet mode. Reflect the stored state on every poll;
  // persist via /api/config on change.
  const ledQuietChk = $('ledQuietChk');
  if (ledQuietChk){
    ledQuietChk.checked = !!(s.led && s.led.quiet);
    ledQuietChk.onchange = async () => {
      const body = new URLSearchParams();
      body.append('led_quiet', ledQuietChk.checked ? '1' : '0');
      try {
        await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString(),
        });
      } catch (_){ /* next poll reconciles */ }
      refreshAll();
    };
  }

  // Access protection ("Login mit PhoneBlock"). Counter buttons:
  //   - off + token set      → "Enable" button visible
  //   - off + token missing  → "needs token" hint, no buttons
  //   - on  + logged in      → state line + Logout + Disable
  //   - on  + not logged in  → cannot happen here; refreshAll would
  //     have caught the 401 from /api/status and switched to the
  //     in-page login state before reaching this branch
  const auth = s.auth || { enabled: false, logged_in: false };
  const authState     = $('authState');
  const authHint      = $('authActivateHint');
  const authEnableBtn = $('authEnable');
  const authLogoutBtn = $('authLogout');
  const authDisableBtn= $('authDisable');
  if (auth.enabled){
    // auth.user is pinned at the first successful SSO round-trip
    // (config_auth_user) and should always be set while auth.enabled
    // is true. Fall back to the generic "PhoneBlock user" wording if
    // the field is somehow empty — older firmware on the device, a
    // backend that didn't yet return a JWT subject, etc.
    const u = (auth.user || '').trim();
    authState.textContent = u
        ? t('status.auth.enabled.user', {user: u})
        : t('status.auth.enabled');
    authState.style.color = '#188038';
    authHint.style.display = 'none';
    authEnableBtn.style.display = 'none';
    authLogoutBtn.style.display = '';
    authDisableBtn.style.display = '';
  } else if (tokenSet){
    authState.textContent = t('status.auth.disabled');
    authState.style.color = '';
    authHint.style.display = '';
    authEnableBtn.style.display = '';
    authLogoutBtn.style.display = 'none';
    authDisableBtn.style.display = 'none';
  } else {
    authState.textContent = t('status.auth.no_token');
    authState.style.color = '#e8710a';
    authHint.style.display = 'none';
    authEnableBtn.style.display = 'none';
    authLogoutBtn.style.display = 'none';
    authDisableBtn.style.display = 'none';
  }
  if (!authEnableBtn.onclick){
    // Real navigation: the dongle 302s to phoneblock.net, login,
    // 302 back to /auth/callback, which sets the cookie and persists
    // auth_enabled=1 only on success. No JS-side state to manage.
    authEnableBtn.onclick = () => {
      window.location.href = '/auth/start?activate=1';
    };
  }
  if (!authLogoutBtn.onclick){
    authLogoutBtn.onclick = async () => {
      authLogoutBtn.disabled = true;
      try {
        // Server's logout 302s back to /; fetch follows it but stops
        // once we read .ok — we navigate explicitly below to land
        // back on the SPA, which then renders the in-page login state.
        await fetch('/auth/logout', { method: 'POST', redirect: 'manual' });
      } catch (_){ /* navigate anyway */ }
      window.location.href = '/';
    };
  }
  if (!authDisableBtn.onclick){
    authDisableBtn.onclick = async () => {
      authDisableBtn.disabled = true;
      try { await fetch('/auth/disable', { method: 'POST' }); }
      catch (_){ /* next poll will reconcile */ }
      authDisableBtn.disabled = false;
      refreshAll();
    };
  }

  const resetBtn = $('resetBtn');
  const resetMsg = $('resetMsg');
  if (resetBtn && !resetBtn.onclick){
    resetBtn.onclick = async () => {
      if (!confirm(t('status.reset.confirm'))) return;
      resetBtn.disabled = true;
      resetMsg.textContent = '';
      try {
        if (!resetNonce){
          resetMsg.textContent = t('status.reset.error',
            {msg: 'No nonce'});
          resetMsg.style.color = '#d93025';
          resetBtn.disabled = false;
          return;
        }
        const r = await fetch('/api/factory-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'confirm=' + encodeURIComponent(resetNonce),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.ok){
          resetMsg.textContent = t('status.reset.running');
          resetMsg.style.color = '#e8710a';
          // Device is about to reboot; stop the poll loop so we do
          // not flood the log with error noise during the outage.
          stopPolling();
        } else {
          resetMsg.textContent = t('status.reset.error',
            {msg: d.message || r.statusText});
          resetMsg.style.color = '#d93025';
          resetBtn.disabled = false;
        }
      } catch (_){
        resetMsg.textContent = t('status.reset.error', {msg: 'Network error'});
        resetMsg.style.color = '#d93025';
        resetBtn.disabled = false;
      }
    };
  }

  // Dev-only crash button. Visible iff firmware was built with
  // CONFIG_CRASH_TEST_ENABLE=y (s.crash_test_enabled=true). On
  // click: fire POST and let the dongle panic — no result handling,
  // because the next thing the page sees is either a reboot or
  // nothing, and either way the user already knows.
  const crashTestRow = $('crashTestRow');
  if (crashTestRow) crashTestRow.style.display = s.crash_test_enabled ? '' : 'none';
  const crashTestBtn = $('crashTestBtn');
  if (crashTestBtn && !crashTestBtn.onclick){
    crashTestBtn.onclick = () => {
      if (!confirm('Panic auslösen?')) return;
      crashTestBtn.disabled = true;
      fetch('/api/dev/crash', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'confirm=' + encodeURIComponent(resetNonce || ''),
      });
    };
  }

  // Firmware update: file picker + upload, or check PhoneBlock CDN
  // for a newer version.
  const fwCurrent  = $('fwCurrent');
  if (fwCurrent){
    fwCurrent.textContent = t('status.fw.current', {
      partition: s.firmware_partition || '–',
      version:   s.firmware_version   || '–',
    });
  }
  // Surface a previously rolled-back update so the user knows why
  // auto-update isn't progressing. The "Check for update" button
  // below resends with force=true and clears the marker on its own.
  // Suppress while a manual check is in flight: the marker is
  // pessimistically set for the version we're currently installing,
  // not yet a confirmed failure.
  const fwFailed = $('fwFailed');
  if (fwFailed){
    if (!fwUpdateInFlight && s.firmware_failed && s.firmware_failed !== ''){
      fwFailed.textContent = t('status.fw.failed', {version: s.firmware_failed});
      fwFailed.style.display = '';
    } else {
      fwFailed.style.display = 'none';
    }
  }
  const fwPick       = $('fwPick');
  const fwFile       = $('fwFile');
  const fwFileName   = $('fwFileName');
  const fwUpload     = $('fwUpload');
  const fwCheck      = $('fwCheck');
  const fwMsg        = $('fwMsg');
  const fwAutoUpdate = $('fwAutoUpdate');
  // s.firmware.auto_update is the persisted device flag. Default true:
  // a missing value (older firmware that didn't expose the field)
  // shouldn't make the toggle look "off" in the UI.
  if (fwAutoUpdate){
    fwAutoUpdate.checked = !s || !s.firmware || s.firmware.auto_update !== false;
    if (!fwAutoUpdate.onchange){
      fwAutoUpdate.onchange = async () => {
        const want = fwAutoUpdate.checked;
        fwAutoUpdate.disabled = true;
        const body = new URLSearchParams();
        body.append('auto_update', want ? '1' : '0');
        try {
          await fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: body.toString(),
          });
        } catch (_){ /* next poll will reconcile */ }
        fwAutoUpdate.disabled = false;
        refreshAll();
      };
    }
  }

  const fwChannel = $('fwChannel');
  // s.firmware.channel is the persisted device channel ("stable" |
  // "beta"). Default "stable" when missing (older firmware that didn't
  // expose the field).
  if (fwChannel){
    fwChannel.value = (s && s.firmware && s.firmware.channel === 'beta')
      ? 'beta' : 'stable';
    if (!fwChannel.onchange){
      fwChannel.onchange = async () => {
        const want = fwChannel.value;
        fwChannel.disabled = true;
        const body = new URLSearchParams();
        body.append('channel', want);
        try {
          await fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: body.toString(),
          });
        } catch (_){ /* next poll will reconcile */ }
        fwChannel.disabled = false;
        refreshAll();
      };
    }
  }

  const fwCrashReport = $('fwCrashReport');
  // s.firmware.crash_report — same default-true treatment as auto_update.
  if (fwCrashReport){
    fwCrashReport.checked = !s || !s.firmware || s.firmware.crash_report !== false;
    if (!fwCrashReport.onchange){
      fwCrashReport.onchange = async () => {
        const want = fwCrashReport.checked;
        fwCrashReport.disabled = true;
        const body = new URLSearchParams();
        body.append('crash_report', want ? '1' : '0');
        try {
          await fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: body.toString(),
          });
        } catch (_){ /* next poll will reconcile */ }
        fwCrashReport.disabled = false;
        refreshAll();
      };
    }
  }

  // --- status email ---
  const mail = s.mail || {};
  if (!mailPrefilled){
    const mh = $('mailHost');
    if (mh){
      mh.value          = mail.host || '';
      $('mailPort').value = mail.port ? String(mail.port) : '';
      $('mailSec').value  = mail.security === 'starttls' ? 'starttls' : 'tls';
      $('mailUser').value = mail.user || '';
      $('mailFrom').value = mail.from || '';
      $('mailTo').value   = mail.to   || '';
      $('mailPassKeep').textContent = mail.pass_set ? t('status.mail.pass.keep') : '';
      $('mailOnError').checked = !!mail.on_error;
      $('mailOnSpam').checked  = !!mail.on_spam;
      $('mailOnUpdate').checked = !!mail.on_update;
      mailPrefilled = true;
    }
  }
  const mailSave = $('mailSave'), mailTest = $('mailTest');
  if (mailSave && !mailSave.onclick){
    const collect = () => {
      const body = new URLSearchParams();
      body.append('smtp_host',     $('mailHost').value.trim());
      body.append('smtp_port',     $('mailPort').value.trim());
      body.append('smtp_security', $('mailSec').value);
      body.append('smtp_user',     $('mailUser').value.trim());
      body.append('smtp_from',     $('mailFrom').value.trim());
      body.append('smtp_to',       $('mailTo').value.trim());
      body.append('mail_on_error', $('mailOnError').checked ? '1' : '0');
      body.append('mail_on_spam',  $('mailOnSpam').checked ? '1' : '0');
      body.append('mail_on_update', $('mailOnUpdate').checked ? '1' : '0');
      // Only send the password when the user typed one; an absent field
      // tells the server to keep the stored value.
      const pw = $('mailPass').value;
      if (pw) body.append('smtp_pass', pw);
      return body;
    };
    const save = async () => {
      const r = await fetch('/api/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: collect().toString(),
      });
      return r.ok;
    };
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    // Reject incomplete / malformed input before it reaches the SMTP path,
    // where a bad value would otherwise fail silently and still report a
    // green "success": an empty recipient (mail_configured() then refuses
    // the send) or a non-address like "My Dongle" in the Absender field
    // (the server rejects MAIL FROM:<My Dongle>). Returns a ready-to-show
    // message and focuses the offending field, or '' when the form is valid.
    const validateMail = () => {
      const bad = (id, key) => { $(id).focus(); return t(key); };
      if (!$('mailHost').value.trim()) return bad('mailHost', 'status.mail.err.host');
      if (!$('mailUser').value.trim()) return bad('mailUser', 'status.mail.err.user');
      // The password may be left blank only when one is already stored —
      // the "leave blank to keep it" hint (mailPassKeep) is shown then.
      if (!$('mailPass').value && !$('mailPassKeep').textContent)
        return bad('mailPass', 'status.mail.err.pass');
      if (!EMAIL_RE.test($('mailTo').value.trim()))
        return bad('mailTo', 'status.mail.err.to');
      // The effective sender is the Absender field, or the SMTP user name
      // when it is left blank (see config_smtp_from()). Either way it becomes
      // the MAIL FROM address, which the server rejects unless it is itself a
      // valid email — so validate whichever one applies. A blank Absender
      // atop a non-email user name is the case that fails silently (#466);
      // point the user at the Absender field to supply a real address.
      const from = $('mailFrom').value.trim();
      const sender = from || $('mailUser').value.trim();
      if (!EMAIL_RE.test(sender))
        return bad('mailFrom', from ? 'status.mail.err.from' : 'status.mail.err.from_user');
      return '';
    };
    mailSave.onclick = async () => {
      const m = $('mailMsg');
      const err = validateMail();
      if (err){ m.textContent = err; m.style.color = '#d93025'; return; }
      mailSave.disabled = true;
      m.textContent = '';
      let ok = false;
      try { ok = await save(); } catch (_){}
      mailSave.disabled = false;
      $('mailPass').value = '';   // typed password is now stored
      m.textContent = ok ? t('status.mail.saved') : t('status.mail.test.fail');
      m.style.color = ok ? '#188038' : '#d93025';
    };
    mailTest.onclick = async () => {
      const m = $('mailMsg');
      const err = validateMail();
      if (err){ m.textContent = err; m.style.color = '#d93025'; return; }
      mailTest.disabled = true; mailSave.disabled = true;
      m.textContent = t('status.mail.testing');
      m.style.color = '#1a73e8';
      let ok = false;
      try {
        // Save first so the test uses exactly what is on screen, then
        // ask the dongle to send through the stored settings.
        await save();
        $('mailPass').value = '';
        const r = await fetch('/api/mail/test', {method: 'POST'});
        const d = await r.json().catch(() => ({}));
        ok = !!d.ok;
      } catch (_){}
      mailTest.disabled = false; mailSave.disabled = false;
      m.textContent = ok ? t('status.mail.test.sent') : t('status.mail.test.fail');
      m.style.color = ok ? '#188038' : '#d93025';
    };
  }
  if (fwPick && !fwPick.onclick){
    fwPick.onclick = () => fwFile.click();
    fwFile.onchange = () => {
      const f = fwFile.files[0];
      fwFileName.textContent = f ? f.name + ' (' + Math.round(f.size/1024) + ' KB)' : '';
      fwUpload.disabled = !f;
      fwMsg.textContent = '';
    };
    fwUpload.onclick = () => {
      const f = fwFile.files[0];
      if (!f) return;
      if (!confirm(t('status.fw.confirm'))) return;
      fwUpload.disabled = true;
      fwPick.disabled   = true;
      fwCheck.disabled  = true;
      // XHR over fetch(): we want upload-progress events, which
      // the fetch API does not expose.
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/firmware', true);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');
      xhr.upload.onprogress = (e) => {
        if (!e.lengthComputable) return;
        const pct = Math.round(e.loaded * 100 / e.total);
        fwMsg.textContent = t('status.fw.uploading', {pct: pct});
        fwMsg.style.color = '#1a73e8';
      };
      xhr.onload = () => {
        let d = {}; try { d = JSON.parse(xhr.responseText); } catch (_){}
        if (xhr.status >= 200 && xhr.status < 300 && d.ok){
          fwMsg.textContent = t('status.fw.done');
          fwMsg.style.color = '#e8710a';
          stopPolling();
        } else {
          fwMsg.textContent = t('status.fw.error',
            {msg: d.message || xhr.statusText || 'HTTP ' + xhr.status});
          fwMsg.style.color = '#d93025';
          fwUpload.disabled = false;
          fwPick.disabled   = false;
          fwCheck.disabled  = false;
        }
      };
      xhr.onerror = () => {
        fwMsg.textContent = t('status.fw.error', {msg: 'Network error'});
        fwMsg.style.color = '#d93025';
        fwUpload.disabled = false;
        fwPick.disabled   = false;
        fwCheck.disabled  = false;
      };
      xhr.send(f);
    };
    fwCheck.onclick = async () => {
      fwCheck.disabled  = true;
      fwUpload.disabled = true;
      fwPick.disabled   = true;
      fwUpdateInFlight  = true;
      // Hide any leftover rollback banner from a *previous* failed
      // attempt — the click forces a retry, so the old "boot did
      // not survive" line is no longer applicable from this moment.
      const fwFailedEl = $('fwFailed');
      if (fwFailedEl) fwFailedEl.style.display = 'none';
      fwMsg.textContent = t('status.fw.checking');
      fwMsg.style.color = '#1a73e8';
      // Tracks whether install reached the reboot-imminent state.
      // When set, finally{} keeps fwUpdateInFlight true so a late
      // /api/status reply (still showing last_failed_ota = the
      // version we just installed) cannot re-light the rollback
      // banner between stopPolling() and the user's reload.
      let rebooting = false;
      try {
        // Phase 1: read-only manifest check (~1-2 s). The user gets
        // immediate feedback ("none" / "version X gefunden") before
        // we commit to the long download.
        const rc = await fetch('/api/firmware/check', {method: 'POST'});
        const dc = await rc.json().catch(() => ({}));
        if (!rc.ok || !dc.ok){
          fwMsg.textContent = t('status.fw.check.error',
            {msg: dc.message || rc.statusText});
          fwMsg.style.color = '#d93025';
          return;
        }
        if (!dc.available){
          fwMsg.textContent = t('status.fw.check.none',
            {version: dc.current_version || s.firmware_version});
          fwMsg.style.color = '#666';
          return;
        }

        // Phase 2: install. Show the "wird installiert" line during
        // the ~30 s download so the message reflects what is actually
        // happening, instead of "Prüfe…" freezing for half a minute.
        fwMsg.textContent = t('status.fw.check.found',
          {version: dc.new_version});
        fwMsg.style.color = '#1a73e8';
        const ri = await fetch('/api/firmware/install', {method: 'POST'});
        const di = await ri.json().catch(() => ({}));
        if (ri.ok && di.ok && di.installed){
          fwMsg.textContent = t('status.fw.check.installed',
            {version: di.new_version});
          fwMsg.style.color = '#e8710a';
          rebooting = true;
          stopPolling();
          // The browser is now stuck on the pre-reboot HTML and
          // would never see the marker get cleared from the next
          // boot's /api/status. Hide the banner ourselves so the
          // page does not have to be reloaded just to look right.
          if (fwFailedEl) fwFailedEl.style.display = 'none';
          return;
        }
        fwMsg.textContent = t('status.fw.check.error',
          {msg: di.message || ri.statusText});
        fwMsg.style.color = '#d93025';
      } catch (_){
        fwMsg.textContent = t('status.fw.check.error', {msg: 'Network error'});
        fwMsg.style.color = '#d93025';
      } finally {
        if (!rebooting){
          fwUpdateInFlight  = false;
          fwCheck.disabled  = false;
          fwPick.disabled   = false;
          fwUpload.disabled = !fwFile.files[0];
        }
      }
    };
  }
}

async function onFritzboxSubmit(e){

  btn.disabled = true;

                  + render2FAInstructions(r.data.methods || '');
    msg.style.color = '#e8710a';
    await poll2FA(msg, btn);

function render2FAInstructions(methods){
  const hints = [];
  if (/\bbutton\b/.test(methods)) hints.push(esc(t('sip.fb.2fa.button')));
  const dtmf = methods.match(/dtmf;(\S+)/);
  if (dtmf) hints.push(t('sip.fb.2fa.dtmf', {seq: '<code>' + esc(dtmf[1]) + '</code>'}));
  return hints.length ? hints.join(' ' + esc('oder') + ' ') : '';
}

async function poll2FA(msgEl, btn){
  const deadline = Date.now() + 130 * 1000;
  while (Date.now() < deadline){
    await new Promise(r => setTimeout(r, 2000));
    const r = await fetchJson('/api/fritzbox-2fa-status');
    if (!r) continue;
    if (r.ok){
      const n = r.internal_number;
      msgEl.textContent = n ? t('sip.fb.done.withnum', {n}) : t('sip.fb.done');
      msgEl.style.color = '#188038';
      setTimeout(() => location.hash = '#/', 800);
      return;
    }
    if (r.terminal){
      msgEl.textContent = t('sip.fb.error', {msg: r.message || t('sip.fb.2fa.cancelled')});
      msgEl.style.color = '#d93025';
      btn.disabled = false;
      return;
    }
  }
  msgEl.textContent = t('sip.fb.2fa.timeout');
  msgEl.style.color = '#d93025';
  btn.disabled = false;
}

async function onProviderSubmit(e){
  e.preventDefault();
  const msg = $('provMsg');
  const btn = e.target.querySelector('button');
  const key = $('provSelect').value;
  const p = PROVIDERS[key];
  if (!p){
    msg.textContent = t('sip.prov.error', {msg: '—'});
    msg.style.color = '#d93025';
    return;
  }
  const host = p.host;
  // Build the POST body ourselves since the preset supplies host/port.
  btn.disabled = true;
  msg.textContent = t('sip.fb.working');
  msg.style.color = '#888';
  // A preset defines a *complete* SIP profile. Send every expert field
  // — including explicit resets for the ones the preset doesn't use —
  // so a prior manual/other-provider setup can't leave stale values
  // behind that survive the merge and break the new registration (#363).
  const body = new URLSearchParams();
  body.append('sip_host', host);
  body.append('sip_port', String(p.port));
  body.append('sip_user', e.target.sip_user.value);
  // Anonymous presets clear the stored password (sip_anon marker) instead
  // of sending one; others send the typed password. sip_auth_user comes
  // from the preset (e.g. anonymous@t-online.de), empty = use SIP user.
  if (p.anonymous){
    body.append('sip_anon', '1');
  } else {
    body.append('sip_pass', e.target.sip_pass.value);
  }
  body.append('sip_transport', p.transport || 'udp');
  body.append('sip_auth_user', p.authUser || '');
  body.append('sip_outbound', '');
  body.append('sip_realm', '');
  // STUN server for RTP NAT discovery — set per preset (empty = off), so
  // switching providers also clears a previous provider's STUN server.
  body.append('sip_stun', p.stun || '');
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString(),
    });
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.ok){
      msg.textContent = t('sip.prov.done');
      msg.style.color = '#188038';
      setTimeout(() => location.hash = '#/', 800);
      return;
    }
    msg.textContent = t('sip.prov.error', {msg: d.message || r.statusText});
    msg.style.color = '#d93025';
    btn.disabled = false;
  } catch (_){
    msg.textContent = t('sip.prov.error', {msg: 'Network error'});
    msg.style.color = '#d93025';
    btn.disabled = false;
  }
}
